      { type: "intro", title: "\u00a1Bienvenido al Entrenamiento VE!", body: "Est\u00e1s rentando un veh\u00edculo el\u00e9ctrico \u2014 \u00a1excelente elecci\u00f3n! Los VE ofrecen menores costos, conducci\u00f3n m\u00e1s suave y menor impacto ambiental. Este m\u00f3dulo cubre todo lo necesario para conducir y cargar con confianza.", visual: "" },
      { type: "learn", label: "VE vs Gasolina", title: "C\u00f3mo un VE difiere de un auto de gasolina", body: "**VE:** Bater\u00eda, menor alcance (~240 millas), m\u00e1s ahorro. **Gasolina (ICE):** Mayor alcance (350+ millas), m\u00e1s gasto. Los VE son silenciosos al encender. La aceleraci\u00f3n es m\u00e1s r\u00e1pida pero la conducci\u00f3n agresiva reduce el alcance. Usa el **Modo de Conducci\u00f3n**.", callout: { icon: "", text: "Los VE son silenciosos al encender \u2014 revisa el tablero para confirmar." } },
      { type: "learn", label: "Frenado Regenerativo", title: "Deja que el auto se recargue solo", body: "Al levantar el pie del acelerador, un VE **reduce velocidad autom\u00e1ticamente y recarga la bater\u00eda**. Ahorra alcance y reduce desgaste de frenos. Practica frenadas suaves y graduales.", callout: { icon: "", text: "Frenado regenerativo = \u00a1alcance gratis! Levanta el pie del acelerador temprano." } },
      { type: "learn", label: "Alcance", title: "Administrando tu alcance", body: "Con carga completa espera **240\u2013270 millas**. **Dir\u00edgete a cargar al 10\u201320% restante.** El clima y estilo de conducci\u00f3n afectan el alcance.", callout: { icon: "", text: "Carga al 10\u201320% restante. \u00a1No dejes que baje del 10%!" } },
      { type: "learn", label: "Niveles de Carga", title: "Nivel 1, Nivel 2 y Nivel 3", body: "**Nivel 1 (~48 hrs):** 120V, ~2\u20135 millas/hora. Solo respaldo. **Nivel 2 (~6\u20138 hrs):** 240V, ~10\u201360 millas/hora. Carga diaria. **Nivel 3 / DCFC (~45 min al 80%):** Carga r\u00e1pida DC. Se ralentiza despu\u00e9s del 80%.", callout: { icon: "", text: "Nivel 3 llega al 80% en ~45 min \u2014 no lo uses diariamente." } },
      { type: "learn", label: "Tipos de Conectores", title: "Conoce tus enchufes", body: "**J-1772** para Nivel 1 y 2. **CCS/SAE** para Nivel 3. Algunos usan **NACS** (estilo Tesla). Verifica el puerto de tu veh\u00edculo.", callout: { icon: "", text: "N1 y N2 = J-1772. N3 = CCS/SAE. Siempre verifica." } },
      { type: "learn", label: "Salud de Bater\u00eda", title: "Mant\u00e9n tu bater\u00eda saludable", body: "**Carga diaria entre 20\u201380%.** **Limita carga r\u00e1pida DC frecuente.** **Evita temperaturas extremas.** **Actualiza el software.** Mant\u00e9n siempre sobre 10%.", callout: { icon: "", text: "Regla diaria: 20\u201380%. Reserva 100% para viajes largos." } },
      { type: "learn", label: "Mantenimiento VE", title: "Mantenimiento m\u00e1s simple", body: "Sin cambios de aceite, buj\u00edas ni l\u00edquido de transmisi\u00f3n. **Chequeo PM Seco VE** cada 10,000 millas. Rotaci\u00f3n de llantas e inspecci\u00f3n de frenos siguen siendo necesarias.", callout: { icon: "", text: "\u00a1Sin cambios de aceite! Solo fluidos, llantas y actualizaciones." } },
      { type: "scenario", title: "Escenario VE", body: "Tu bater\u00eda est\u00e1 al 15% con 35 millas restantes. \u00bfQu\u00e9 haces?", options: [ { text: "Seguir conduciendo y terminar los viajes", correct: false }, { text: "Ir a cargar \u2014 est\u00e1s en zona del 10\u201320%", correct: true }, { text: "Apagar el A/C y seguir hasta el 5%", correct: false } ], explanation: "Dir\u00edgete a cargar al 10\u201320%. No dejes que baje del 10%." },
      { type: "checkpoint", title: "Verificaci\u00f3n VE", question: "\u00bfCu\u00e1l es el rango de carga diaria \u00f3ptimo?", options: [ { text: "0\u2013100% cada vez", correct: false }, { text: "20\u201380%", correct: true }, { text: "50\u2013100%", correct: false }, { text: "Agotar a 0% y cargar completo", correct: false } ], explanation: "Mant\u00e9n la carga entre 20\u201380%. Reserva 100% para viajes largos." },
    ],
  },
  ru: {
    id: "ev", icon: "", title: "\u041e\u0441\u043d\u043e\u0432\u044b \u042d\u043b\u0435\u043a\u0442\u0440\u043e\u043c\u043e\u0431\u0438\u043b\u044f", subtitle: "\u0412\u0441\u0451 \u0447\u0442\u043e \u043d\u0443\u0436\u043d\u043e \u0437\u043d\u0430\u0442\u044c \u043e \u0432\u0430\u0448\u0435\u043c \u042d\u041c", accent: "#003B71",
    steps: [
      { type: "intro", title: "\u0414\u043e\u0431\u0440\u043e \u043f\u043e\u0436\u0430\u043b\u043e\u0432\u0430\u0442\u044c \u0432 \u043e\u0431\u0443\u0447\u0435\u043d\u0438\u0435 \u043f\u043e \u042d\u041c!", body: "\u0412\u044b \u0430\u0440\u0435\u043d\u0434\u0443\u0435\u0442\u0435 \u044d\u043b\u0435\u043a\u0442\u0440\u043e\u043c\u043e\u0431\u0438\u043b\u044c \u2014 \u043e\u0442\u043b\u0438\u0447\u043d\u044b\u0439 \u0432\u044b\u0431\u043e\u0440! \u042d\u041c \u043f\u0440\u0435\u0434\u043b\u0430\u0433\u0430\u044e\u0442 \u043d\u0438\u0437\u043a\u0438\u0435 \u0440\u0430\u0441\u0445\u043e\u0434\u044b, \u043f\u043b\u0430\u0432\u043d\u043e\u0435 \u0432\u043e\u0436\u0434\u0435\u043d\u0438\u0435 \u0438 \u043c\u0435\u043d\u044c\u0448\u0435\u0435 \u0432\u043e\u0437\u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0435 \u043d\u0430 \u043e\u043a\u0440\u0443\u0436\u0430\u044e\u0449\u0443\u044e \u0441\u0440\u0435\u0434\u0443.", visual: "" },
      { type: "learn", label: "\u042d\u041c vs \u0411\u0435\u043d\u0437\u0438\u043d", title: "\u0427\u0435\u043c \u042d\u041c \u043e\u0442\u043b\u0438\u0447\u0430\u0435\u0442\u0441\u044f", body: "**\u042d\u041c:** \u0410\u043a\u043a\u0443\u043c\u0443\u043b\u044f\u0442\u043e\u0440, ~240 \u043c\u0438\u043b\u044c, \u044d\u043a\u043e\u043d\u043e\u043c\u0438\u044f. **\u0411\u0435\u043d\u0437\u0438\u043d (\u0414\u0412\u0421):** 350+ \u043c\u0438\u043b\u044c, \u0431\u043e\u043b\u044c\u0448\u0435 \u0440\u0430\u0441\u0445\u043e\u0434\u043e\u0432. \u042d\u041c \u0431\u0435\u0441\u0448\u0443\u043c\u043d\u044b \u043f\u0440\u0438 \u0437\u0430\u043f\u0443\u0441\u043a\u0435. \u0420\u0430\u0437\u0433\u043e\u043d \u0431\u044b\u0441\u0442\u0440\u0435\u0435, \u043d\u043e \u0430\u0433\u0440\u0435\u0441\u0441\u0438\u0432\u043d\u0430\u044f \u0435\u0437\u0434\u0430 \u0441\u043e\u043a\u0440\u0430\u0449\u0430\u0435\u0442 \u0437\u0430\u043f\u0430\u0441 \u0445\u043e\u0434\u0430.", callout: { icon: "", text: "\u042d\u041c \u0431\u0435\u0441\u0448\u0443\u043c\u043d\u044b \u2014 \u043f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435 \u043f\u0440\u0438\u0431\u043e\u0440\u043d\u0443\u044e \u043f\u0430\u043d\u0435\u043b\u044c." } },
      { type: "learn", label: "\u0420\u0435\u043a\u0443\u043f\u0435\u0440\u0430\u0446\u0438\u044f", title: "\u041f\u0443\u0441\u0442\u044c \u0430\u0432\u0442\u043e \u043f\u043e\u0434\u0437\u0430\u0440\u044f\u0436\u0430\u0435\u0442\u0441\u044f \u0441\u0430\u043c", body: "\u041f\u0440\u0438 \u043e\u0442\u043f\u0443\u0441\u043a\u0430\u043d\u0438\u0438 \u0430\u043a\u0441\u0435\u043b\u0435\u0440\u0430\u0442\u043e\u0440\u0430 \u042d\u041c **\u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438 \u0437\u0430\u043c\u0435\u0434\u043b\u044f\u0435\u0442\u0441\u044f \u0438 \u043f\u043e\u0434\u0437\u0430\u0440\u044f\u0436\u0430\u0435\u0442 \u0431\u0430\u0442\u0430\u0440\u0435\u044e**. \u042d\u043a\u043e\u043d\u043e\u043c\u0438\u0442 \u0437\u0430\u043f\u0430\u0441 \u0445\u043e\u0434\u0430 \u0438 \u0441\u043d\u0438\u0436\u0430\u0435\u0442 \u0438\u0437\u043d\u043e\u0441 \u0442\u043e\u0440\u043c\u043e\u0437\u043e\u0432.", callout: { icon: "", text: "\u0420\u0435\u043a\u0443\u043f\u0435\u0440\u0430\u0446\u0438\u044f = \u0431\u0435\u0441\u043f\u043b\u0430\u0442\u043d\u044b\u0439 \u0437\u0430\u043f\u0430\u0441 \u0445\u043e\u0434\u0430!" } },
      { type: "learn", label: "\u0417\u0430\u043f\u0430\u0441 \u0425\u043e\u0434\u0430", title: "\u0423\u043f\u0440\u0430\u0432\u043b\u0435\u043d\u0438\u0435 \u0437\u0430\u043f\u0430\u0441\u043e\u043c \u0445\u043e\u0434\u0430", body: "\u041f\u0440\u0438 100% \u043e\u0436\u0438\u0434\u0430\u0439\u0442\u0435 **240\u2013270 \u043c\u0438\u043b\u044c**. **\u0417\u0430\u0440\u044f\u0436\u0430\u0439\u0442\u0435 \u043f\u0440\u0438 10\u201320% \u043e\u0441\u0442\u0430\u0442\u043a\u0430.** \u041a\u043b\u0438\u043c\u0430\u0442-\u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044c \u0438 \u0441\u0442\u0438\u043b\u044c \u0432\u043e\u0436\u0434\u0435\u043d\u0438\u044f \u0432\u043b\u0438\u044f\u044e\u0442 \u043d\u0430 \u0437\u0430\u043f\u0430\u0441 \u0445\u043e\u0434\u0430.", callout: { icon: "", text: "\u0417\u0430\u0440\u044f\u0436\u0430\u0439\u0442\u0435 \u043f\u0440\u0438 10\u201320%. \u041d\u0435 \u043d\u0438\u0436\u0435 10%!" } },
      { type: "learn", label: "\u0423\u0440\u043e\u0432\u043d\u0438 \u0417\u0430\u0440\u044f\u0434\u043a\u0438", title: "\u0423\u0440\u043e\u0432\u043d\u0438 1, 2 \u0438 3", body: "**\u0423\u0440. 1 (~48 \u0447):** 120\u0412, ~2\u20135 \u043c\u0438\u043b\u044c/\u0447. \u0420\u0435\u0437\u0435\u0440\u0432. **\u0423\u0440. 2 (~6\u20138 \u0447):** 240\u0412, ~10\u201360 \u043c\u0438\u043b\u044c/\u0447. \u0415\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u0430\u044f. **\u0423\u0440. 3 / DCFC (~45 \u043c\u0438\u043d \u0434\u043e 80%):** \u0411\u044b\u0441\u0442\u0440\u0430\u044f DC. \u0421\u043a\u043e\u0440\u043e\u0441\u0442\u044c \u043f\u0430\u0434\u0430\u0435\u0442 \u043f\u043e\u0441\u043b\u0435 80%.", callout: { icon: "", text: "\u0423\u0440. 3 = 80% \u0437\u0430 ~45 \u043c\u0438\u043d. \u041d\u0435 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0439\u0442\u0435 \u0435\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u043e." } },
      { type: "learn", label: "\u0420\u0430\u0437\u044a\u0451\u043c\u044b", title: "\u0417\u043d\u0430\u0439\u0442\u0435 \u0440\u0430\u0437\u044a\u0451\u043c\u044b", body: "**J-1772** \u0434\u043b\u044f \u0443\u0440. 1 \u0438 2. **CCS/SAE** \u0434\u043b\u044f \u0443\u0440. 3. \u041d\u0435\u043a\u043e\u0442\u043e\u0440\u044b\u0435 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044e\u0442 **NACS**. \u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435 \u043f\u043e\u0440\u0442 \u043f\u0435\u0440\u0435\u0434 \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435\u043c.", callout: { icon: "", text: "\u0423\u0440. 1\u20132 = J-1772. \u0423\u0440. 3 = CCS/SAE." } },
      { type: "learn", label: "\u0417\u0434\u043e\u0440\u043e\u0432\u044c\u0435 \u0411\u0430\u0442\u0430\u0440\u0435\u0438", title: "\u041f\u043e\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u0439\u0442\u0435 \u0437\u0434\u043e\u0440\u043e\u0432\u044c\u0435 \u0431\u0430\u0442\u0430\u0440\u0435\u0438", body: "**\u0417\u0430\u0440\u044f\u0434 20\u201380%** \u0435\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u043e. **\u041e\u0433\u0440\u0430\u043d\u0438\u0447\u044c\u0442\u0435 \u0447\u0430\u0441\u0442\u0443\u044e \u0431\u044b\u0441\u0442\u0440\u0443\u044e \u0437\u0430\u0440\u044f\u0434\u043a\u0443.** **\u0418\u0437\u0431\u0435\u0433\u0430\u0439\u0442\u0435 \u044d\u043a\u0441\u0442\u0440\u0435\u043c\u0430\u043b\u044c\u043d\u044b\u0445 \u0442\u0435\u043c\u043f\u0435\u0440\u0430\u0442\u0443\u0440.** **\u041e\u0431\u043d\u043e\u0432\u043b\u044f\u0439\u0442\u0435 \u041f\u041e.** \u041d\u0435 \u043d\u0438\u0436\u0435 10%.", callout: { icon: "", text: "\u0415\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u043e: 20\u201380%. 100% \u0442\u043e\u043b\u044c\u043a\u043e \u0434\u043b\u044f \u0434\u0430\u043b\u044c\u043d\u0438\u0445 \u043f\u043e\u0435\u0437\u0434\u043e\u043a." } },
      { type: "learn", label: "\u0422\u041e \u042d\u041c", title: "\u041e\u0431\u0441\u043b\u0443\u0436\u0438\u0432\u0430\u043d\u0438\u0435 \u043f\u0440\u043e\u0449\u0435", body: "\u0411\u0435\u0437 \u0437\u0430\u043c\u0435\u043d\u044b \u043c\u0430\u0441\u043b\u0430, \u0441\u0432\u0435\u0447\u0435\u0439, \u0442\u0440\u0430\u043d\u0441\u043c\u0438\u0441\u0441\u0438\u043e\u043d\u043d\u043e\u0439 \u0436\u0438\u0434\u043a\u043e\u0441\u0442\u0438. **\u0421\u0443\u0445\u0430\u044f \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0422\u041e** \u043a\u0430\u0436\u0434\u044b\u0435 10 000 \u043c\u0438\u043b\u044c. \u0420\u043e\u0442\u0430\u0446\u0438\u044f \u0448\u0438\u043d \u0438 \u043f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u0442\u043e\u0440\u043c\u043e\u0437\u043e\u0432 \u043d\u0443\u0436\u043d\u044b.", callout: { icon: "", text: "\u0411\u0435\u0437 \u043c\u0430\u0441\u043b\u0430! \u0422\u043e\u043b\u044c\u043a\u043e \u0436\u0438\u0434\u043a\u043e\u0441\u0442\u0438, \u0448\u0438\u043d\u044b, \u041f\u041e." } },
      { type: "scenario", title: "\u0421\u0446\u0435\u043d\u0430\u0440\u0438\u0439 \u042d\u041c", body: "\u0411\u0430\u0442\u0430\u0440\u0435\u044f 15%, 35 \u043c\u0438\u043b\u044c \u043e\u0441\u0442\u0430\u043b\u043e\u0441\u044c. \u0427\u0442\u043e \u0434\u0435\u043b\u0430\u0442\u044c?", options: [ { text: "\u041f\u0440\u043e\u0434\u043e\u043b\u0436\u0430\u0442\u044c \u0435\u0437\u0434\u0438\u0442\u044c", correct: false }, { text: "\u0415\u0445\u0430\u0442\u044c \u043d\u0430 \u0437\u0430\u0440\u044f\u0434\u043a\u0443 \u2014 \u0437\u043e\u043d\u0430 10\u201320%", correct: true }, { text: "\u0412\u044b\u043a\u043b\u044e\u0447\u0438\u0442\u044c \u043a\u043e\u043d\u0434\u0438\u0446\u0438\u043e\u043d\u0435\u0440, \u0435\u0445\u0430\u0442\u044c \u0434\u043e 5%", correct: false } ], explanation: "\u0417\u0430\u0440\u044f\u0436\u0430\u0439\u0442\u0435 \u043f\u0440\u0438 10\u201320%. \u041d\u0435 \u043d\u0438\u0436\u0435 10%." },
      { type: "checkpoint", title: "\u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u042d\u041c", question: "\u041e\u043f\u0442\u0438\u043c\u0430\u043b\u044c\u043d\u044b\u0439 \u0434\u0438\u0430\u043f\u0430\u0437\u043e\u043d \u0437\u0430\u0440\u044f\u0434\u043a\u0438?", options: [ { text: "0\u2013100%", correct: false }, { text: "20\u201380%", correct: true }, { text: "50\u2013100%", correct: false }, { text: "\u0414\u043e 0% \u0438 \u043f\u043e\u043b\u043d\u0430\u044f \u0437\u0430\u0440\u044f\u0434\u043a\u0430", correct: false } ], explanation: "\u0417\u0430\u0440\u044f\u0434 20\u201380% \u0435\u0436\u0435\u0434\u043d\u0435\u0432\u043d\u043e. 100% \u0442\u043e\u043b\u044c\u043a\u043e \u0434\u043b\u044f \u0434\u0430\u043b\u044c\u043d\u0438\u0445 \u043f\u043e\u0435\u0437\u0434\u043e\u043a." },
    ],
  },
  ar: {
    id: "ev", icon: "", title: "\u0623\u0633\u0627\u0633\u064a\u0627\u062a \u0627\u0644\u0645\u0631\u0643\u0628\u0629 \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a\u0629", subtitle: "\u0643\u0644 \u0645\u0627 \u062a\u062d\u062a\u0627\u062c \u0645\u0639\u0631\u0641\u062a\u0647 \u0639\u0646 \u0645\u0631\u0643\u0628\u062a\u0643 \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a\u0629", accent: "#003B71",
    steps: [
      { type: "intro", title: "\u0645\u0631\u062d\u0628\u0627\u064b \u0628\u0643 \u0641\u064a \u062a\u062f\u0631\u064a\u0628 \u0627\u0644\u0645\u0631\u0643\u0628\u0627\u062a \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a\u0629!", body: "\u0623\u0646\u062a \u062a\u0633\u062a\u0623\u062c\u0631 \u0645\u0631\u0643\u0628\u0629 \u0643\u0647\u0631\u0628\u0627\u0626\u064a\u0629 \u2014 \u062e\u064a\u0627\u0631 \u0645\u0645\u062a\u0627\u0632! \u0647\u0630\u0647 \u0627\u0644\u0648\u062d\u062f\u0629 \u062a\u063a\u0637\u064a \u0643\u0644 \u0645\u0627 \u062a\u062d\u062a\u0627\u062c\u0647 \u0644\u0644\u0642\u064a\u0627\u062f\u0629 \u0648\u0627\u0644\u0634\u062d\u0646 \u0628\u062b\u0642\u0629.", visual: "" },
      { type: "learn", label: "\u0643\u0647\u0631\u0628\u0627\u0626\u064a vs \u0628\u0646\u0632\u064a\u0646", title: "\u0627\u0644\u0641\u0631\u0642 \u0628\u064a\u0646 \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a \u0648\u0627\u0644\u0628\u0646\u0632\u064a\u0646", body: "**\u0643\u0647\u0631\u0628\u0627\u0626\u064a:** \u0628\u0637\u0627\u0631\u064a\u0629\u060c ~240 \u0645\u064a\u0644\u060c \u062a\u0648\u0641\u064a\u0631 \u0623\u0643\u062b\u0631. **\u0628\u0646\u0632\u064a\u0646:** 350+ \u0645\u064a\u0644\u060c \u0625\u0646\u0641\u0627\u0642 \u0623\u0643\u062b\u0631. \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a \u0635\u0627\u0645\u062a \u0639\u0646\u062f \u0627\u0644\u062a\u0634\u063a\u064a\u0644. \u0627\u0644\u062a\u0633\u0627\u0631\u0639 \u0623\u0633\u0631\u0639 \u0644\u0643\u0646 \u0627\u0644\u0642\u064a\u0627\u062f\u0629 \u0627\u0644\u0639\u0646\u064a\u0641\u0629 \u062a\u0642\u0644\u0644 \u0627\u0644\u0645\u062f\u0649.", callout: { icon: "", text: "\u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a \u0635\u0627\u0645\u062a \u2014 \u062a\u062d\u0642\u0642 \u0645\u0646 \u0644\u0648\u062d\u0629 \u0627\u0644\u0642\u064a\u0627\u062f\u0629." } },
      { type: "learn", label: "\u0627\u0644\u0643\u0628\u062d \u0627\u0644\u062a\u062c\u062f\u064a\u062f\u064a", title: "\u062f\u0639 \u0627\u0644\u0633\u064a\u0627\u0631\u0629 \u062a\u0639\u064a\u062f \u0634\u062d\u0646 \u0646\u0641\u0633\u0647\u0627", body: "\u0639\u0646\u062f \u0631\u0641\u0639 \u0642\u062f\u0645\u0643 \u0639\u0646 \u0627\u0644\u062f\u0648\u0627\u0633\u0629\u060c \u0627\u0644\u0633\u064a\u0627\u0631\u0629 **\u062a\u062a\u0628\u0627\u0637\u0623 \u0648\u062a\u0639\u064a\u062f \u0634\u062d\u0646 \u0627\u0644\u0628\u0637\u0627\u0631\u064a\u0629** \u062a\u0644\u0642\u0627\u0626\u064a\u0627\u064b.", callout: { icon: "", text: "\u0627\u0644\u0643\u0628\u062d \u0627\u0644\u062a\u062c\u062f\u064a\u062f\u064a = \u0645\u062f\u0649 \u0645\u062c\u0627\u0646\u064a!" } },
      { type: "learn", label: "\u0645\u062f\u0649 \u0627\u0644\u0628\u0637\u0627\u0631\u064a\u0629", title: "\u0625\u062f\u0627\u0631\u0629 \u0645\u062f\u0627\u0643", body: "\u0639\u0646\u062f 100% \u062a\u0648\u0642\u0639 **240\u2013270 \u0645\u064a\u0644**. **\u0627\u0634\u062d\u0646 \u0639\u0646\u062f 10\u201320% \u0645\u062a\u0628\u0642\u064a.** \u0627\u0644\u062a\u0643\u064a\u064a\u0641 \u0648\u0623\u0633\u0644\u0648\u0628 \u0627\u0644\u0642\u064a\u0627\u062f\u0629 \u064a\u0624\u062b\u0631\u0627\u0646 \u0639\u0644\u0649 \u0627\u0644\u0645\u062f\u0649.", callout: { icon: "", text: "\u0627\u0634\u062d\u0646 \u0639\u0646\u062f 10\u201320%. \u0644\u0627 \u062a\u062f\u0639\u0647\u0627 \u062a\u0646\u062e\u0641\u0636 \u062a\u062d\u062a 10%!" } },
      { type: "learn", label: "\u0645\u0633\u062a\u0648\u064a\u0627\u062a \u0627\u0644\u0634\u062d\u0646", title: "\u0627\u0644\u0645\u0633\u062a\u0648\u0649 1\u060c 2 \u0648 3", body: "**\u0645. 1 (~48 \u0633\u0627\u0639\u0629):** 120\u0641\u060c ~2\u20135 \u0645\u064a\u0644/\u0633\u0627\u0639\u0629. \u0627\u062d\u062a\u064a\u0627\u0637\u064a. **\u0645. 2 (~6\u20138 \u0633\u0627\u0639\u0627\u062a):** 240\u0641\u060c ~10\u201360 \u0645\u064a\u0644/\u0633\u0627\u0639\u0629. \u064a\u0648\u0645\u064a. **\u0645. 3 / DCFC (~45 \u062f. \u0644\u0640 80%):** \u0634\u062d\u0646 DC \u0633\u0631\u064a\u0639.", callout: { icon: "", text: "\u0645. 3 = 80% \u0641\u064a ~45 \u062f\u0642\u064a\u0642\u0629. \u0644\u0627 \u062a\u0639\u062a\u0645\u062f \u0639\u0644\u064a\u0647 \u064a\u0648\u0645\u064a\u0627\u064b." } },
      { type: "learn", label: "\u0623\u0646\u0648\u0627\u0639 \u0627\u0644\u0645\u0648\u0635\u0644\u0627\u062a", title: "\u0627\u0639\u0631\u0641 \u0642\u0648\u0627\u0628\u0633 \u0627\u0644\u0634\u062d\u0646", body: "**J-1772** \u0644\u0645. 1 \u0648 2. **CCS/SAE** \u0644\u0645. 3. \u0628\u0639\u0636\u0647\u0627 **NACS**. \u062a\u062d\u0642\u0642 \u0645\u0646 \u0627\u0644\u0645\u0646\u0641\u0630 \u0642\u0628\u0644 \u0627\u0644\u062a\u0648\u0635\u064a\u0644.", callout: { icon: "", text: "\u0645. 1\u20132 = J-1772. \u0645. 3 = CCS/SAE." } },
      { type: "learn", label: "\u0635\u062d\u0629 \u0627\u0644\u0628\u0637\u0627\u0631\u064a\u0629", title: "\u062d\u0627\u0641\u0638 \u0639\u0644\u0649 \u0635\u062d\u0629 \u0628\u0637\u0627\u0631\u064a\u062a\u0643", body: "**\u0634\u062d\u0646 \u064a\u0648\u0645\u064a 20\u201380%.** **\u0642\u0644\u0644 \u0627\u0644\u0634\u062d\u0646 \u0627\u0644\u0633\u0631\u064a\u0639 \u0627\u0644\u0645\u062a\u0643\u0631\u0631.** **\u062a\u062c\u0646\u0628 \u0627\u0644\u062d\u0631\u0627\u0631\u0629 \u0627\u0644\u0642\u0635\u0648\u0649.** **\u062d\u062f\u0651\u062b \u0627\u0644\u0628\u0631\u0645\u062c\u064a\u0627\u062a.** \u0623\u0628\u0642\u0650 \u0641\u0648\u0642 10%.", callout: { icon: "", text: "\u064a\u0648\u0645\u064a\u0627\u064b: 20\u201380%. 100% \u0644\u0644\u0631\u062d\u0644\u0627\u062a \u0627\u0644\u0637\u0648\u064a\u0644\u0629 \u0641\u0642\u0637." } },
      { type: "learn", label: "\u0635\u064a\u0627\u0646\u0629 \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a", title: "\u0627\u0644\u0635\u064a\u0627\u0646\u0629 \u0623\u0628\u0633\u0637", body: "\u0628\u062f\u0648\u0646 \u0632\u064a\u062a \u0623\u0648 \u0634\u0645\u0639\u0627\u062a \u0625\u0634\u0639\u0627\u0644. **\u0641\u062d\u0635 \u0627\u0644\u0635\u064a\u0627\u0646\u0629 \u0627\u0644\u062c\u0627\u0641** \u0643\u0644 10,000 \u0645\u064a\u0644. \u062a\u062f\u0648\u064a\u0631 \u0627\u0644\u0625\u0637\u0627\u0631\u0627\u062a \u0648\u0641\u062d\u0635 \u0627\u0644\u0641\u0631\u0627\u0645\u0644 \u0636\u0631\u0648\u0631\u064a\u0627\u0646.", callout: { icon: "", text: "\u0628\u062f\u0648\u0646 \u0632\u064a\u062a! \u0641\u0642\u0637 \u0633\u0648\u0627\u0626\u0644 \u0648\u0625\u0637\u0627\u0631\u0627\u062a \u0648\u0628\u0631\u0645\u062c\u064a\u0627\u062a." } },
      { type: "scenario", title: "\u0633\u064a\u0646\u0627\u0631\u064a\u0648 \u0643\u0647\u0631\u0628\u0627\u0626\u064a", body: "\u0627\u0644\u0628\u0637\u0627\u0631\u064a\u0629 15%\u060c 35 \u0645\u064a\u0644 \u0645\u062a\u0628\u0642\u064a. \u0645\u0627\u0630\u0627 \u062a\u0641\u0639\u0644\u061f", options: [ { text: "\u0627\u0633\u062a\u0645\u0631 \u0641\u064a \u0627\u0644\u0642\u064a\u0627\u062f\u0629", correct: false }, { text: "\u062a\u0648\u062c\u0647 \u0644\u0644\u0634\u062d\u0646 \u2014 \u0645\u0646\u0637\u0642\u0629 10\u201320%", correct: true }, { text: "\u0623\u0637\u0641\u0626 \u0627\u0644\u0645\u0643\u064a\u0641 \u0648\u0627\u0633\u062a\u0645\u0631 \u062d\u062a\u0649 5%", correct: false } ], explanation: "\u062a\u0648\u062c\u0647 \u0644\u0644\u0634\u062d\u0646 \u0639\u0646\u062f 10\u201320%. \u0644\u0627 \u062a\u062f\u0639\u0647\u0627 \u062a\u0646\u062e\u0641\u0636 \u062a\u062d\u062a 10%." },
      { type: "checkpoint", title: "\u0627\u062e\u062a\u0628\u0627\u0631 \u0627\u0644\u0643\u0647\u0631\u0628\u0627\u0626\u064a", question: "\u0645\u0627 \u0647\u0648 \u0646\u0637\u0627\u0642 \u0627\u0644\u0634\u062d\u0646 \u0627\u0644\u064a\u0648\u0645\u064a \u0627\u0644\u0623\u0645\u062b\u0644\u061f", options: [ { text: "0\u2013100% \u0643\u0644 \u0645\u0631\u0629", correct: false }, { text: "20\u201380%", correct: true }, { text: "50\u2013100%", correct: false }, { text: "\u062a\u0641\u0631\u064a\u063a \u0644\u0640 0% \u062b\u0645 \u0634\u062d\u0646 \u0643\u0627\u0645\u0644", correct: false } ], explanation: "\u0634\u062d\u0646 20\u201380% \u064a\u0648\u0645\u064a\u0627\u064b. 100% \u0644\u0644\u0631\u062d\u0644\u0627\u062a \u0627\u0644\u0637\u0648\u064a\u0644\u0629 \u0641\u0642\u0637." },

  zh: {
    id: "ev", icon: "EV", title: "电动车培训", subtitle: "电动车基础知识", accent: "#DA3AB3",
    steps: [
      { type: "intro", visual: "", title: "电动车培训", body: "本模块涵盖驾驶和维护电动车的基本知识。" },
      { type: "learn", label: "电动vs汽油", title: "关键区别", body: "电动车使用**电动马达**和电池。无需换油、无火花塞，**再生制动**可回收能量。", callout: null },
      { type: "learn", label: "再生制动", title: "制动时回收能量", body: "松开油门时，电动车使用**再生制动**减速并充电。平稳加速和制动 = 更好的续航。", callout: { icon: "", text: "平稳驾驶 = 更好续航" } },
      { type: "learn", label: "续航管理", title: "智能管理续航", body: "电量到**30%**（~80英里）时充电。日常充电保持**20-80%**。速度低于**65mph**。避免运动模式——使用**节能模式**。", callout: { icon: "", text: "30%充电 - 日常20-80% - 节能模式" } },
      { type: "learn", label: "充电级别", title: "了解1级、2级和3级", body: "**1级**：标准插座——很慢。**2级**：240V——4-10小时。**3级（快充）**：20-60分钟到80%。优先使用**3级**。", callout: null },
      { type: "learn", label: "接口类型", title: "CCS、J1772和NACS", body: "**J1772**：1/2级。**CCS/SAE**：3级快充。**NACS（特斯拉）**。推荐：**EVGo和Electrify America**。", callout: { icon: "", text: "1/2级 = J1772 - 3级 = CCS/SAE - EVGo推荐" } },
      { type: "learn", label: "电池健康", title: "20-80%规则", body: "日常保持充电在**20%到80%**之间。避免经常充到100%或低于10%。", callout: null },
      { type: "learn", label: "电动车维护", title: "维护更简单", body: "比汽油车需要**更少维护**。**道路救援不适用于电量耗尽**——拖车充电需收费。", callout: { icon: "", text: "道路救援不适用于电量耗尽" } },
      { type: "scenario", title: "电动车场景", body: "电量25%，15分钟到3级快充站。怎么做？", options: [ { text: "继续到5%", correct: false }, { text: "去快充站充到80%", correct: true }, { text: "打道路救援", correct: false } ], explanation: "25%时去最近的3级充电站。建议：开启Dispatch in Range过滤器。" },
      { type: "checkpoint", title: "电动车测验", question: "应该在多少电量时开始充电？", options: [ { text: "5%", correct: false }, { text: "30%", correct: true }, { text: "50%", correct: false }, { text: "80%", correct: false } ], explanation: "30%时充电（~80英里）。日常20-80%。使用EVGo或Electrify America。" },
    ],
  },

  fr: {

      { type: "learn", label: "VE vs Essence", title: "Differences cles", body: "Les VE utilisent un **moteur electrique** avec batterie. Pas de vidanges, pas de bougies, et le **freinage regeneratif** recupere de l'energie.", callout: null },
      { type: "learn", label: "Freinage Regeneratif", title: "Recuperez de l'energie en freinant", body: "Quand vous levez le pied de l'accelerateur, le VE utilise le **freinage regeneratif** pour ralentir et recharger la batterie. Acceleration et freinage en douceur = meilleure autonomie.", callout: { icon: "", text: "Douceur = meilleure autonomie" } },

/* ───────────────────── HELPERS ───────────────────── */
function parseBold(text) {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((part, i) =>
    i % 2 === 1 ? (
      <strong key={i} style={{ color: "#ffffff", fontWeight: 700 }}>{part}</strong>
    ) : (
      <span key={i}>{part}</span>
    )
  );
}

function btnPrimary(accent, disabled) {
  return {
    background: disabled ? "#d4d4e0" : accent,
    color: "#fff",
    border: "none",
    borderRadius: 12,
    padding: "14px 28px",
    fontSize: 14,
    fontWeight: 700,
    cursor: disabled ? "not-allowed" : "pointer",
    fontFamily: "'Source Sans Pro', sans-serif",
    transition: "all 0.25s",
    letterSpacing: "0.01em",
    opacity: disabled ? 0.5 : 1,
  };
}

function btnOutline(accent) {
  return {
    background: "#FF00BF",
    color: "#fff",
    border: "none",
    borderRadius: 12,
    padding: "12px 24px",
    fontSize: 14,
    fontWeight: 700,
    cursor: "pointer",
    fontFamily: "'Source Sans Pro', sans-serif",
    transition: "all 0.25s",
  };
}

/* ───────────────────── STEP COMPONENTS ───────────────────── */

function StepDots({ total, current, accent }) {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
      {Array.from({ length: total }, (_, i) => (
        <div
          key={i}
          style={{
            width: i === current ? 28 : 8,
            height: 8,
            borderRadius: 4,
            background: i < current ? `${accent}88` : i === current ? accent : "#e2e2ee",
            transition: "all 0.4s cubic-bezier(.4,0,.2,1)",
          }}
        />
      ))}
    </div>
  );
}

function IntroCard({ step, accent, onNext, t }) {
  return (
    <div style={{ textAlign: "center", padding: "12px 0" }}>
      <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 24, fontWeight: 800, color: "#ffffff", margin: "0 0 12px", lineHeight: 1.3 }}>
        {step.title}
      </h2>
      <p style={{ fontSize: 15, color: "#ffffffcc", lineHeight: 1.7, maxWidth: 420, margin: "0 auto 30px" }}>
        {step.body}
      </p>
      <button onClick={onNext} style={btnPrimary("#FF00BF", false)}>
        {t("letsBegin")}
      </button>
    </div>
  );
}

function LearnCard({ step, accent, onNext, t }) {
  return (
    <div>
      <div style={{ display: "inline-block", fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#ffffff", background: "#ffffff18", padding: "5px 12px", borderRadius: 6, marginBottom: 14 }}>
        {step.label}
      </div>
      <h3 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 21, fontWeight: 700, color: "#ffffff", margin: "0 0 14px", lineHeight: 1.35 }}>
        {step.title}

function ScenarioCard({ step, accent, onNext, t }) {
  const [selected, setSelected] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [wrongPicks, setWrongPicks] = useState(new Set());
  const answered = showFeedback && selected !== null;
  const isCorrect = answered && step.options[selected].correct;

  const handlePick = (i) => {
    if (showFeedback) return;
    setSelected(i);
    setShowFeedback(true);
    if (!step.options[i].correct) {
      setWrongPicks((prev) => new Set([...prev, i]));
    }
  };

  const handleRetry = () => {
    setSelected(null);
    setShowFeedback(false);
  };

  return (
    <div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#003B71", background: "#003B7108", padding: "5px 12px", borderRadius: 6, marginBottom: 14 }}>
        {t("scenario")}
      </div>
      <h3 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 20, fontWeight: 700, color: "#ffffff", margin: "0 0 10px", lineHeight: 1.3 }}>
        {step.title}
      </h3>
      <p style={{ fontSize: 15, color: "#ffffffcc", lineHeight: 1.7, margin: "0 0 20px" }}>{step.body}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {step.options.map((opt, i) => {
          let bg = "#FF00BF", border = "none", color = "#fff";
          const isDisabled = wrongPicks.has(i) || (answered && isCorrect);
          if (answered && opt.correct) { bg = "#065f46"; border = "2px solid #6ee7b7"; color = "#fff"; }
          else if (answered && i === selected && !isCorrect) { bg = "#991b1b"; border = "2px solid #fca5a5"; color = "#fff"; }
          else if (wrongPicks.has(i)) { bg = "#991b1b80"; border = "none"; color = "#ffffff80"; }
          return (
            <button key={i} onClick={() => handlePick(i)} disabled={isDisabled}
              style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", textAlign: "left", fontSize: 14, color, cursor: isDisabled ? "default" : "pointer", fontFamily: "'Source Sans Pro', sans-serif", lineHeight: 1.5, transition: "all 0.25s", fontWeight: 500, opacity: wrongPicks.has(i) && !answered ? 0.55 : 1 }}>
              {opt.text}
            </button>
          );
        })}
      </div>
      {answered && (
        <div style={{ marginTop: 16, padding: "14px 18px", borderRadius: 12, background: isCorrect ? "#065f4630" : "#991b1b25", border: isCorrect ? "1px solid #6ee7b780" : "1px solid #fca5a580", fontSize: 14, lineHeight: 1.6, color: "#ffffffdd" }}>
          <strong>{isCorrect ? t("correct") : t("notQuite")}</strong> {isCorrect ? step.explanation : t("wrongTryAgain")}
        </div>
      )}
      {answered && isCorrect && (
        <button onClick={onNext} style={{ ...btnPrimary("#FF00BF", false), marginTop: 16 }}>
          {t("continue")}
        </button>
      )}
      {answered && !isCorrect && (
        <button onClick={handleRetry} style={{ ...btnOutline(accent), marginTop: 16 }}>
          Try Again →
        </button>
      )}
    </div>
  );
}

function CheckpointCard({ step, accent, onComplete, alreadyPassed, t, onQuizResult }) {
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(alreadyPassed);
  const [wrongPicks, setWrongPicks] = useState(new Set());
  const isCorrect = selected !== null && step.options[selected].correct;

  const handleSubmit = () => {
    setSubmitted(true);
    if (step.options[selected].correct) {
      const attempts = wrongPicks.size + 1;
      if (onQuizResult) onQuizResult(step.question, attempts === 1, attempts);
      onComplete();
    } else {
      setWrongPicks((prev) => new Set([...prev, selected]));
    }
  };

  const handleRetry = () => {
    setSelected(null);
    setSubmitted(false);
  };

  return (
    <div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#ffffff", background: "#ffffff18", padding: "5px 12px", borderRadius: 6, marginBottom: 14 }}>
        {t("finalCheck")}
      </div>
      <h3 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 20, fontWeight: 700, color: "#ffffff", margin: "0 0 10px", lineHeight: 1.3 }}>
        {step.title}
      </h3>
      <p style={{ fontSize: 15, color: "#ffffffcc", lineHeight: 1.7, margin: "0 0 20px", fontWeight: 500 }}>{step.question}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {step.options.map((opt, i) => {
          let bg = "#FF00BF", border = "none", color = "#fff";
          const isDisabled = wrongPicks.has(i) || (submitted && isCorrect);
          if (submitted && opt.correct && isCorrect) { bg = "#065f46"; border = "2px solid #6ee7b7"; color = "#fff"; }
          else if (submitted && i === selected && !isCorrect) { bg = "#991b1b"; border = "2px solid #fca5a5"; color = "#fff"; }
          else if (wrongPicks.has(i)) { bg = "#991b1b80"; border = "none"; color = "#ffffff80"; }
          else if (!submitted && i === selected) { bg = "#FF00BF"; border = "2px solid #fff"; }
          return (
            <button key={i} onClick={() => !submitted && !wrongPicks.has(i) && setSelected(i)} disabled={isDisabled}
              style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", textAlign: "left", fontSize: 14, color, cursor: isDisabled ? "default" : "pointer", fontFamily: "'Source Sans Pro', sans-serif", lineHeight: 1.5, transition: "all 0.25s", fontWeight: 500, opacity: wrongPicks.has(i) && !(submitted && !isCorrect && i === selected) ? 0.55 : 1 }}>
              {opt.text}
            </button>
          );
        })}
      </div>
      {!submitted && (
        <button onClick={handleSubmit} disabled={selected === null} style={{ ...btnPrimary("#FF00BF", selected === null), marginTop: 16 }}>
          {t("submitAnswer")}
        </button>
      )}
      {submitted && (
        <>
          <div style={{ marginTop: 16, padding: "14px 18px", borderRadius: 12, background: isCorrect ? "#065f4630" : "#991b1b25", border: isCorrect ? "1px solid #6ee7b780" : "1px solid #fca5a580", fontSize: 14, lineHeight: 1.6, color: "#ffffffdd" }}>
            <strong>{isCorrect ? t("correct") : t("notQuite")}</strong> {isCorrect ? step.explanation : t("wrongTryAgain")}
          </div>
          {isCorrect && (
            <div style={{ marginTop: 22, textAlign: "center", padding: "24px", borderRadius: 16, background: "linear-gradient(135deg, #065f4630, #065f4620)", border: "2px solid #6ee7b780" }}>
  
              <div style={{ fontSize: 18, fontWeight: 800, color: "#6ee7b7", fontFamily: "'Source Sans Pro', sans-serif" }}>
                {t("moduleComplete")}
              </div>
              <div style={{ fontSize: 13, color: "#6ee7b7cc", marginTop: 4, fontWeight: 600 }}>
                {t("topicLockedIn")}
              </div>
            </div>
          )}
          {!isCorrect && (
            <button onClick={handleRetry} style={{ ...btnOutline(accent), marginTop: 16 }}>
              {t("tryAgain")}
            </button>
          )}
        </>
      )}
    </div>
  );
}

function FlexdriveOnboarding() {
  const [lang, setLang] = useState(null);
  const [activeModuleIdx, setActiveModuleIdx] = useState(null);
  const [stepIdx, setStepIdx] = useState(0);
  const [completedModules, setCompletedModules] = useState(new Set());
  const [animKey, setAnimKey] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [startTime, setStartTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [showCelebration, setShowCelebration] = useState(false);
  const [finalTime, setFinalTime] = useState(null);
  const [evChoice, setEvChoice] = useState(null);
  const [market, setMarket] = useState(null);
  const [driverName, setDriverName] = useState(""); // null=not asked, true=EV, false=not EV

  // ─── Tracking State ───
  const [quizResults, setQuizResults] = useState([]);
  const [moduleTimes, setModuleTimes] = useState([]);
  const moduleStartRef = useRef(null);
  const trackingSentRef = useRef(false);

  const baseMods = lang === "es" ? MODULES_ES : lang === "ru" ? MODULES_RU : lang === "ar" ? MODULES_AR : lang === "fr" ? MODULES_FR : lang === "zh" ? MODULES_ZH : lang === "yue" ? MODULES_YUE : MODULES;
  const evMod = EV_MODULE[lang] || EV_MODULE.en;
  const MODS = evChoice ? [evMod, ...baseMods] : baseMods;
  const t = (key) => (UI[lang] || UI.en)[key] || UI.en[key] || key;
  const mod = activeModuleIdx !== null ? MODS[activeModuleIdx] : null;
  const step = mod ? mod.steps[stepIdx] : null;
  const totalCompleted = completedModules.size;
  const progress = Math.round((totalCompleted / MODS.length) * 100);

  // Timer tick
  useEffect(() => {
    const interval = setInterval(() => {
      if (startTime && !showCelebration) {
        setElapsed(Math.floor((Date.now() - startTime) / 1000));
      }
    }, 1000);
    return () => clearInterval(interval);
  }, [startTime, showCelebration]);

  const formatTime = (secs) => {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
  };

  const goNext = useCallback(() => {
    if (!mod) return;
    if (stepIdx < mod.steps.length - 1) {
      setStepIdx((s) => s + 1);
      setAnimKey((k) => k + 1);
    }
  }, [mod, stepIdx]);

  // Auto-send tracking when celebration shows
  useEffect(() => {
    if (showCelebration && !trackingSentRef.current) {
      sendTrackingData(!!evChoice, !!evChoice);
    }
  }, [showCelebration]);

  const selectMarket = (code) => {
    setMarket(code);
  };

  const selectModule = (idx) => {
    if (!startTime) setStartTime(Date.now());
    moduleStartRef.current = Date.now();
    setActiveModuleIdx(idx);
    setStepIdx(0);
    setAnimKey((k) => k + 1);
  };

  const handleModuleComplete = (modId) => {
    const next = new Set([...completedModules, modId]);
    setCompletedModules(next);
    // Track module timing
    if (moduleStartRef.current) {
      const elapsed = Math.floor((Date.now() - moduleStartRef.current) / 1000);
      setModuleTimes((prev) => [...prev, { module: modId, timeSec: elapsed, timeFormatted: formatTime(elapsed) }]);
      moduleStartRef.current = null;
    }
    if (next.size === MODS.length) {
      const totalSecs = Math.floor((Date.now() - startTime) / 1000);
      setFinalTime(totalSecs);
      setShowCelebration(true);
    }
  };

  const trackQuizResult = (moduleId, question, firstTryCorrect, attempts) => {
    setQuizResults((prev) => [...prev, { module: moduleId, question, firstTryCorrect, attempts }]);
  };

  const sendTrackingData = (isEV, evDone) => {
    if (!GOOGLE_SCRIPT_URL || trackingSentRef.current) return;
    trackingSentRef.current = true;
    const payload = {
      language: lang || "en",
      completionTimeSec: finalTime || 0,
      completionTimeFormatted: finalTime ? formatTime(finalTime) : "0:00",
      modulesCompleted: completedModules.size,
      totalModules: MODS.length,
      driverName: driverName || "",
      market: market || "",
      isEV: isEV ? "Yes" : "No",
      evCompleted: isEV ? "Yes" : "N/A",
      quizResults,
      moduleTimes,
    };
    fetch(GOOGLE_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    }).catch(() => {});
  };

  const handleRestart = () => {
    setActiveModuleIdx(null);
    setStepIdx(0);
    setCompletedModules(new Set());
    setAnimKey(0);
    setStartTime(null);
    setElapsed(0);
    setShowCelebration(false);
    setFinalTime(null);
    setLang(null);
    setEvChoice(null);
    setMarket(null);
    setDriverName("");
    setQuizResults([]);
    setModuleTimes([]);
    moduleStartRef.current = null;
    trackingSentRef.current = false;
  };

  return (
    <div style={{ minHeight: "100vh", background: "#ffffff", fontFamily: "'Source Sans Pro', sans-serif", display: "flex", flexDirection: "column" }}>
      <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet" />

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes celebPop { 0% { opacity: 0; transform: scale(0.7); } 50% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(420px) rotate(720deg); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        button:hover { filter: brightness(1.06); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4d4e0; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
      `}</style>

      {/* HEADER */}
      <header style={{ background: "#003B71", borderBottom: "3px solid #FF00BF", padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "1px solid #ffffff30", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16, lineHeight: 1, color: "#ffffffcc" }}>

          </button>

            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase", color: "#FF00BF", marginBottom: 2, display: "flex", alignItems: "center" }}>

        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>

                </button>
                <button onClick={() => setLang("yue")}
                  style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 14, padding: "18px 36px", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif", minWidth: 160, transition: "all 0.25s" }}>
                  中文（廣東話）
                </button>
              </div>
            </div>
            ) : market === null ? (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", maxWidth: 520, animation: "fadeIn 0.5s ease", background: "#003B71", borderRadius: 20, padding: "32px 28px", boxShadow: "0 4px 24px rgba(0,59,113,0.15)" }}>

              <div style={{ width: "100%", marginBottom: 20, background: "#ffffff10", borderRadius: 14, padding: "16px 20px", border: "2px solid #FF00BF" }}>
                <p style={{ fontSize: 14, fontWeight: 800, color: "#FF00BF", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 8, textAlign: "center" }}>{t("yourFirstName")}</p>
                <input
                  type="text"
                  placeholder={t("enterName")}
                  value={driverName}
                  onChange={(e) => setDriverName(e.target.value)}
                  style={{ width: "100%", padding: "14px 16px", borderRadius: 10, border: "2px solid #FF00BF", background: "#ffffff20", color: "#fff", fontSize: 18, fontWeight: 700, fontFamily: "'Source Sans Pro', sans-serif", outline: "none", textAlign: "center", letterSpacing: "0.05em" }}
                />
              </div>

              <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 22, fontWeight: 800, color: "#ffffff", marginBottom: 6, lineHeight: 1.25 }}>
                {t("selectMarket")}
              </h2>
              <p style={{ fontSize: 12, color: "#ffffff88", lineHeight: 1.5, marginBottom: 12 }}>
                {t("selectMarketSub")}
              </p>

              <div style={{ width: "100%", maxHeight: 300, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
                {MARKET_REGIONS.map((region) => (
                  <div key={region.region} style={{ marginBottom: 12 }}>
                    <p style={{ fontSize: 10, fontWeight: 800, color: "#FF00BF", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 6, textAlign: "left", paddingLeft: 4 }}>{region.region}</p>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {region.markets.map((m) => (
                        <button key={m.code} onClick={() => selectMarket(m.code)} disabled={driverName.length < 2}
                          style={{ background: driverName.length < 2 ? "#ffffff20" : "#FF00BF", color: "#fff", border: "none", borderRadius: 10, padding: "10px 14px", fontSize: 12, fontWeight: 700, cursor: driverName.length < 2 ? "not-allowed" : "pointer", fontFamily: "'Source Sans Pro', sans-serif", flex: "1 1 calc(50% - 4px)", minWidth: 120, transition: "all 0.25s", opacity: driverName.length < 2 ? 0.4 : 1 }}>
                          {m.code} — {m.name}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            ) : evChoice === null ? (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", maxWidth: 480, animation: "fadeIn 0.5s ease", background: "#003B71", borderRadius: 20, padding: "40px 36px", boxShadow: "0 4px 24px rgba(0,59,113,0.15)" }}>

              <div style={{ background: "#ffffff15", border: "1px solid #ffffff30", borderRadius: 14, padding: "16px 20px", marginBottom: 24, textAlign: "left", width: "100%" }}>
                <p style={{ fontSize: 13, fontWeight: 700, color: "#FF00BF", marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.05em" }}>{t("beforeYouBegin")}</p>
                <p style={{ fontSize: 13, color: "#ffffffdd", lineHeight: 1.6 }}>{t("licenseNotice")}</p>
              </div>
              <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 26, fontWeight: 800, color: "#ffffff", marginBottom: 24, lineHeight: 1.25 }}>
                {t("evQuestion")}
              </h2>
              <div style={{ display: "flex", gap: 14, flexWrap: "wrap", justifyContent: "center" }}>
                <button onClick={() => { setEvChoice(true); }}
                  style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 14, padding: "18px 36px", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif", minWidth: 160, transition: "all 0.25s" }}>
                  {t("yesEV")}
                </button>
                <button onClick={() => { setEvChoice(false); }}
                  style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 14, padding: "18px 36px", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif", minWidth: 160, transition: "all 0.25s" }}>
                  {t("noEV")}
                </button>
              </div>
            </div>
            ) : (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", maxWidth: 480, animation: "fadeIn 0.5s ease", background: "#003B71", borderRadius: 20, padding: "40px 36px", boxShadow: "0 4px 24px rgba(0,59,113,0.15)" }}>

              <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 26, fontWeight: 800, color: "#ffffff", marginBottom: 10, lineHeight: 1.25 }}>
                {t("welcomeTo")}
                <div style={{ display: "flex", justifyContent: "center", margin: "8px 0" }}>
                  <img src={LOGO_WHITE} alt="flexdrive" style={{ height: 50 }} />
                </div>
                {t("driverOnboarding")}
              </h2>
              <p style={{ fontSize: 15, color: "#ffffffcc", lineHeight: 1.7, marginBottom: 12 }}>
                {t("welcomeSub")}
              </p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", margin: "8px 0 28px" }}>
                {[t("guidedLessons"), t("scenarios"), t("quizzes")].map((tag) => (
                  <span key={tag} style={{ fontSize: 12, fontWeight: 600, color: "#ffffff", background: "#ffffff18", padding: "5px 12px", borderRadius: 8 }}>{tag}</span>
                ))}
              </div>
              <button onClick={() => selectModule(0)} style={btnPrimary("#FF00BF", false)}>
                {t("startModule")}
              </button>
            </div>
            )
          ) : (
            <div key={animKey} style={{ maxWidth: 560, width: "100%", animation: "slideUp 0.3s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                <StepDots total={mod.steps.length} current={stepIdx} accent={mod.accent} />
                <span style={{ fontSize: 12, fontWeight: 700, color: "#003B71" }}>
                  {stepIdx + 1} / {mod.steps.length}
                </span>
              </div>

              <div style={{ background: "#003B71", borderRadius: 20, padding: "32px 30px", border: "none", boxShadow: "0 4px 24px rgba(0,59,113,0.15)", minHeight: 340 }}>
                {step.type === "intro" && <IntroCard step={step} accent={mod.accent} onNext={goNext} t={t} />}
                {step.type === "visual" && <VisualCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t} />}
                {step.type === "learn" && <LearnCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t} />}
                {step.type === "scenario" && <ScenarioCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t} />}
                {step.type === "checkpoint" && (
                  <CheckpointCard
                    key={`${mod.id}-${stepIdx}`}
                    step={step}
                    accent={mod.accent}
                    alreadyPassed={completedModules.has(mod.id)}
                    t={t}
                    onComplete={() => handleModuleComplete(mod.id)}
                    onQuizResult={(q, firstTry, attempts) => trackQuizResult(mod.id, q, firstTry, attempts)}
                  />
                )}
              </div>

              {completedModules.has(mod.id) && stepIdx === mod.steps.length - 1 && activeModuleIdx < MODS.length - 1 && (
                <div style={{ textAlign: "center", marginTop: 22 }}>
                  <button onClick={() => selectModule(activeModuleIdx + 1)}
                    style={{ ...btnPrimary("#FF00BF", false) }}>
                    {t("continueTo")} {MODS[activeModuleIdx + 1].title} →
                  </button>
                </div>
              )}
            </div>
          )}
        </main>
      </div>


      



      {/* CELEBRATION OVERLAY */}
      {showCelebration && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "linear-gradient(135deg, #003B71ee, #003B71dd)",
          display: "flex", alignItems: "flex-start", justifyContent: "center",
          zIndex: 100, animation: "fadeIn 0.5s ease",
          overflowY: "auto", WebkitOverflowScrolling: "touch",
          padding: "24px 16px",
        }}>
          {/* Confetti particles */}
          {Array.from({ length: 30 }, (_, i) => (
            <div key={i} style={{
              position: "absolute",
              top: -20,
              left: `${Math.random() * 100}%`,
              width: Math.random() * 10 + 6,
              height: Math.random() * 10 + 6,
              borderRadius: Math.random() > 0.5 ? "50%" : "2px",
              background: ["#FF00BF", "#DA3AB3", "#5E0D8B", "#fff", "#7D868C", "#10b981"][i % 6],
              animation: `confetti ${Math.random() * 2 + 2}s linear ${Math.random() * 1.5}s infinite`,
              opacity: 0.9,
            }} />
          ))}

          <div style={{
            background: "#003B71", borderRadius: 20, padding: "28px 24px", maxWidth: 480, width: "100%",
            textAlign: "center", animation: "celebPop 0.6s ease", position: "relative",
            boxShadow: "0 20px 60px rgba(0,0,0,0.3)",
          }}>

            <h1 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 24, fontWeight: 900, color: "#ffffff", margin: "0 0 12px" }}>
              {t("youDidIt")}
            </h1>
            <div style={{ background: "#FF00BF", borderRadius: 12, padding: "16px 20px", marginBottom: 16, width: "100%", maxWidth: 400 }}>
              <p style={{ fontSize: 16, fontWeight: 800, color: "#ffffff", lineHeight: 1.5, textAlign: "center" }}>
                {t("associateNotified")}
              </p>
            </div>
            <p style={{ fontSize: 14, color: "#ffffffcc", lineHeight: 1.5, margin: "0 0 6px" }}>
              {t("celebSub1")} {MODS.length}
            </p>
            <div style={{ margin: "0 auto 6px", display: "flex", justifyContent: "center" }}>
              <img src={LOGO_WHITE} alt="flexdrive" style={{ height: 36 }} />
            </div>
            <p style={{ fontSize: 14, color: "#ffffffcc", lineHeight: 1.5, margin: "0 0 16px" }}>
              {t("celebSub2")}<br/>{t("celebSub3")}
            </p>

            <div style={{
              display: "inline-flex", alignItems: "center", gap: 10,
              background: "#ffffff12", borderRadius: 12, padding: "10px 20px",
              marginBottom: 16, border: "1px solid #ffffff25",
            }}>
              
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#ffffffaa", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                  {t("completionTime")}
                </div>
                <div style={{ fontSize: 22, fontWeight: 900, color: "#ffffff", fontFamily: "monospace", lineHeight: 1.2 }}>
                  {finalTime && formatTime(finalTime)}
                </div>
              </div>
            </div>


            <div style={{ background: "#ffffff12", border: "1px solid #ffffff25", borderRadius: 12, padding: "14px 16px", marginBottom: 14, textAlign: "left", width: "100%", maxWidth: 420 }}>
              <p style={{ fontSize: 12, fontWeight: 800, color: "#FF00BF", marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.06em" }}>{t("quickRef")}</p>
              <p style={{ fontSize: 10, color: "#ffffff66", marginBottom: 8 }}>{t("quickRefSub")}</p>
              {[
                t("qrBilling"),
                t("qrMaintenance"),
                t("qrMiles"),
                t("qrAccidents"),
                t("qrReRental"),
                t("qrDamage"),
                t("qrReturn"),
                t("qrHolman"),
                ...(evChoice ? [t("qrEV")] : []),
              ].map((item, i) => (
                <div key={i} style={{ fontSize: 11, color: "#ffffffdd", lineHeight: 1.4, padding: "4px 0", borderBottom: "1px solid #ffffff10" }}>
                  {item}
                </div>
              ))}
            </div>

            <p style={{ fontSize: 13, fontWeight: 600, color: "#ffffffcc", margin: "0 0 10px" }}>{t("appTourQuestion")}</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", marginBottom: 16 }}>
              <button onClick={() => window.open("app-guide.html", "_blank")}
                style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 10, padding: "12px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif" }}>
                {t("startAppTour")}
              </button>
            </div>

            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => setShowCelebration(false)}
                style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 10, padding: "12px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif" }}>
                {t("reviewModules")}
              </button>
              <button onClick={handleRestart}
                style={{ background: "#FF00BF", color: "#fff", border: "none", borderRadius: 10, padding: "12px 20px", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif" }}>
                {t("nextDriver")}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}



    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(FlexdriveOnboarding));
  </script>
</body>
</html>
