function parseBold(text) {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((part, i) =>
    i % 2 === 1 ? (
      <strong key={i} style={{ color: "#1a1a2e", fontWeight: 700 }}>{part}</strong>
    ) : (
      <span key={i}>{part}</span>
    )
  );
}

function btnPrimary(accent, disabled) {
  return {
    background: disabled ? "#d4d4e0" : accent,
    color: "#fff",
    border: "none",
    borderRadius: 12,
    padding: "14px 28px",
    fontSize: 14,
    fontWeight: 700,
    cursor: disabled ? "not-allowed" : "pointer",
    fontFamily: "'Source Sans Pro', sans-serif",
    transition: "all 0.25s",
    letterSpacing: "0.01em",
    opacity: disabled ? 0.5 : 1,
  };
}

function btnOutline(accent) {
  return {
    background: "transparent",
    color: accent,
    border: `2px solid ${accent}`,
    borderRadius: 12,
    padding: "12px 24px",
    fontSize: 14,
    fontWeight: 700,
    cursor: "pointer",
    fontFamily: "'Source Sans Pro', sans-serif",
    transition: "all 0.25s",
  };
}

function StepDots({ total, current, accent }) {
  return (
    <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} style={{ width: i === current ? 28 : 8, height: 8, borderRadius: 4, background: i < current ? `${accent}88` : i === current ? accent : "#e2e2ee", transition: "all 0.4s cubic-bezier(.4,0,.2,1)" }} />
      ))}
    </div>
  );
}

function IntroCard({ step, accent, onNext }) {
  return (
    <div style={{ textAlign: "center", padding: "12px 0" }}>
      <div style={{ width: 96, height: 96, borderRadius: 28, background: `linear-gradient(135deg, ${accent}15, ${accent}08)`, border: `2px solid ${accent}25`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 44, margin: "0 auto 26px" }}>
        {step.visual}
      </div>
      <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 24, fontWeight: 800, color: "#1a1a2e", margin: "0 0 12px", lineHeight: 1.3 }}>{step.title}</h2>
      <p style={{ fontSize: 15, color: "#6a6a88", lineHeight: 1.7, maxWidth: 420, margin: "0 auto 30px" }}>{step.body}</p>
      <button onClick={onNext} style={btnPrimary(accent, false)}>Let's Begin →</button>
    </div>
  );
}

function LearnCard({ step, accent, onNext }) {

function ScenarioCard({ step, accent, onNext }) {
  const [selected, setSelected] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [wrongPicks, setWrongPicks] = useState(new Set());
  const answered = showFeedback && selected !== null;
  const isCorrect = answered && step.options[selected].correct;

  const handlePick = (i) => {
    if (showFeedback) return;
    setSelected(i);
    setShowFeedback(true);
    if (!step.options[i].correct) setWrongPicks((prev) => new Set([...prev, i]));
  };

  return (
    <div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#003B71", background: "#003B7108", padding: "5px 12px", borderRadius: 6, marginBottom: 14 }}>💭 Scenario</div>
      <h3 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 20, fontWeight: 700, color: "#1a1a2e", margin: "0 0 10px", lineHeight: 1.3 }}>{step.title}</h3>
      <p style={{ fontSize: 15, color: "#4a4a68", lineHeight: 1.7, margin: "0 0 20px" }}>{step.body}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {step.options.map((opt, i) => {
          let bg = "#f8f8fc", border = "2px solid #e8e8f0", color = "#2a2a48";
          const isDisabled = wrongPicks.has(i) || (answered && isCorrect);
          if (answered && opt.correct) { bg = "#ecfdf5"; border = "2px solid #6ee7b7"; color = "#065f46"; }
          else if (answered && i === selected && !isCorrect) { bg = "#fef2f2"; border = "2px solid #fca5a5"; color = "#991b1b"; }
          else if (wrongPicks.has(i)) { bg = "#fef2f2"; border = "2px solid #fecaca"; color = "#991b1b80"; }
          return (
            <button key={i} onClick={() => handlePick(i)} disabled={isDisabled}
              style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", textAlign: "left", fontSize: 14, color, cursor: isDisabled ? "default" : "pointer", fontFamily: "'Source Sans Pro', sans-serif", lineHeight: 1.5, transition: "all 0.25s", fontWeight: 500, opacity: wrongPicks.has(i) && !answered ? 0.55 : 1 }}>
              {opt.text}
            </button>
          );
        })}
      </div>
      {answered && (
        <div style={{ marginTop: 16, padding: "14px 18px", borderRadius: 12, background: isCorrect ? "#ecfdf5" : "#fef2f2", border: isCorrect ? "1px solid #a7f3d0" : "1px solid #fecaca", fontSize: 14, lineHeight: 1.6, color: isCorrect ? "#065f46" : "#991b1b" }}>
          <strong>{isCorrect ? "✓ Correct!" : "✗ Not quite."}</strong> {isCorrect ? step.explanation : "That's not the right answer. Try again!"}
        </div>
      )}
      {answered && isCorrect && <button onClick={onNext} style={{ ...btnPrimary(accent, false), marginTop: 16 }}>Continue →</button>}
      {answered && !isCorrect && <button onClick={() => { setSelected(null); setShowFeedback(false); }} style={{ ...btnOutline(accent), marginTop: 16 }}>Try Again →</button>}
    </div>
  );
}

function CheckpointCard({ step, accent, onComplete, alreadyPassed }) {
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(alreadyPassed);
  const [wrongPicks, setWrongPicks] = useState(new Set());
  const isCorrect = selected !== null && step.options[selected].correct;

  const handleSubmit = () => {
    setSubmitted(true);
    if (step.options[selected].correct) onComplete();
    else setWrongPicks((prev) => new Set([...prev, selected]));
  };

  return (
    <div>
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: accent, background: `${accent}10`, padding: "5px 12px", borderRadius: 6, marginBottom: 14 }}>🎯 Final Check</div>
      <h3 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 20, fontWeight: 700, color: "#1a1a2e", margin: "0 0 10px", lineHeight: 1.3 }}>{step.title}</h3>
      <p style={{ fontSize: 15, color: "#4a4a68", lineHeight: 1.7, margin: "0 0 20px", fontWeight: 500 }}>{step.question}</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {step.options.map((opt, i) => {
          let bg = "#f8f8fc", border = "2px solid #e8e8f0", color = "#2a2a48";
          const isDisabled = wrongPicks.has(i) || (submitted && isCorrect);
          if (submitted && opt.correct && isCorrect) { bg = "#ecfdf5"; border = "2px solid #6ee7b7"; color = "#065f46"; }
          else if (submitted && i === selected && !isCorrect) { bg = "#fef2f2"; border = "2px solid #fca5a5"; color = "#991b1b"; }
          else if (wrongPicks.has(i)) { bg = "#fef2f2"; border = "2px solid #fecaca"; color = "#991b1b80"; }
          else if (!submitted && i === selected) { bg = `${accent}08`; border = `2px solid ${accent}`; }
          return (
            <button key={i} onClick={() => !submitted && !wrongPicks.has(i) && setSelected(i)} disabled={isDisabled}
              style={{ background: bg, border, borderRadius: 12, padding: "14px 18px", textAlign: "left", fontSize: 14, color, cursor: isDisabled ? "default" : "pointer", fontFamily: "'Source Sans Pro', sans-serif", lineHeight: 1.5, transition: "all 0.25s", fontWeight: 500, opacity: wrongPicks.has(i) ? 0.55 : 1 }}>
              {opt.text}
            </button>
          );
        })}
      </div>
      {!submitted && <button onClick={handleSubmit} disabled={selected === null} style={{ ...btnPrimary(accent, selected === null), marginTop: 16 }}>Submit Answer</button>}
      {submitted && (
        <>
          <div style={{ marginTop: 16, padding: "14px 18px", borderRadius: 12, background: isCorrect ? "#ecfdf5" : "#fef2f2", border: isCorrect ? "1px solid #a7f3d0" : "1px solid #fecaca", fontSize: 14, lineHeight: 1.6, color: isCorrect ? "#065f46" : "#991b1b" }}>
            <strong>{isCorrect ? "✓ Correct!" : "✗ Not quite."}</strong> {isCorrect ? step.explanation : "That's not the right answer. Try again!"}
          </div>
          {isCorrect && (
            <div style={{ marginTop: 22, textAlign: "center", padding: "24px", borderRadius: 16, background: "linear-gradient(135deg, #f0fdf4, #ecfdf5)", border: "2px solid #a7f3d0" }}>
              <div style={{ fontSize: 36, marginBottom: 6 }}>🎉</div>
              <div style={{ fontSize: 18, fontWeight: 800, color: "#065f46", fontFamily: "'Source Sans Pro', sans-serif" }}>Module Complete!</div>
              <div style={{ fontSize: 13, color: "#34d399", marginTop: 4, fontWeight: 600 }}>Great work — this topic is locked in.</div>
            </div>
          )}
          {!isCorrect && <button onClick={() => { setSelected(null); setSubmitted(false); }} style={{ ...btnOutline(accent), marginTop: 16 }}>Try Again →</button>}
        </>
      )}
    </div>
  );
}

      { type: "visual", label: "Step 5", title: "Manage Rental & View History", body: "Scroll further to see **Recent usage** and **Manage rental** with quick links to billing history, maintenance scheduling, and plan changes.", image: PLACEHOLDER_IMG, callout: { icon: "🔧", text: "Use Manage rental to view billing, schedule maintenance, or change your mileage/protection plan." } },
      { type: "checkpoint", title: "Knowledge Check", question: "To view your ride minimum and personal miles, where do you navigate?", options: [{ text: "Settings > Account > Rides", correct: false }, { text: "☰ Menu > Vehicle and Devices > Your Vehicles > See details", correct: true }, { text: "The earnings tab at the top of the home screen", correct: false }, { text: "Support and Resources > Rental Info", correct: false }], explanation: "Navigate to ☰ Menu > Vehicle and Devices > Your Vehicles > See details to see your ride minimum, personal miles, recent usage, and manage rental options." },
    ],
  },
];

// ─── MAIN APP ───
export default function FlexdriveOnboarding() {
  const [activeModuleIdx, setActiveModuleIdx] = useState(null);
  const [stepIdx, setStepIdx] = useState(0);
  const [completedModules, setCompletedModules] = useState(new Set());
  const [animKey, setAnimKey] = useState(0);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [startTime, setStartTime] = useState(null);
  const [elapsed, setElapsed] = useState(0);
  const [showCelebration, setShowCelebration] = useState(false);
  const [finalTime, setFinalTime] = useState(null);

  const mod = activeModuleIdx !== null ? MODULES[activeModuleIdx] : null;
  const step = mod ? mod.steps[stepIdx] : null;
  const totalCompleted = completedModules.size;
  const progress = Math.round((totalCompleted / MODULES.length) * 100);

  useEffect(() => {
    const interval = setInterval(() => {
      if (startTime && !showCelebration) setElapsed(Math.floor((Date.now() - startTime) / 1000));
    }, 1000);
    return () => clearInterval(interval);
  }, [startTime, showCelebration]);

  const formatTime = (secs) => {
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
  };

  const goNext = useCallback(() => {
    if (!mod) return;
    if (stepIdx < mod.steps.length - 1) { setStepIdx((s) => s + 1); setAnimKey((k) => k + 1); }
  }, [mod, stepIdx]);

  const selectModule = (idx) => {
    if (!startTime) setStartTime(Date.now());
    setActiveModuleIdx(idx); setStepIdx(0); setAnimKey((k) => k + 1);
  };

  const handleModuleComplete = (modId) => {
    const next = new Set([...completedModules, modId]);
    setCompletedModules(next);
    if (next.size === MODULES.length) {
      setFinalTime(Math.floor((Date.now() - startTime) / 1000));
      setShowCelebration(true);
    }
  };

  const handleRestart = () => {
    setActiveModuleIdx(null); setStepIdx(0); setCompletedModules(new Set());
    setAnimKey(0); setStartTime(null); setElapsed(0); setShowCelebration(false); setFinalTime(null);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#F6F6FB", fontFamily: "'Source Sans Pro', sans-serif", display: "flex", flexDirection: "column" }}>
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes celebPop { 0% { opacity: 0; transform: scale(0.7); } 50% { transform: scale(1.05); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(420px) rotate(720deg); opacity: 0; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        button:hover { filter: brightness(1.06); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #d4d4e0; border-radius: 3px; }
      `}</style>

      {/* HEADER */}
      <header style={{ background: "#003B71", borderBottom: "1px solid #002a55", padding: "18px 24px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{ background: "none", border: "1px solid #ffffff30", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16, lineHeight: 1, color: "#ffffffcc" }}>☰</button>
          <div>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.18em", textTransform: "uppercase", color: "#FF00BF", marginBottom: 2 }}>
              <span style={{ color: "#FF00BF", fontWeight: 900, fontSize: 16 }}>flexdrive</span>
            </div>
            <h1 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 20, fontWeight: 800, color: "#ffffff", margin: 0 }}>Driver Onboarding</h1>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          {startTime && !showCelebration && (
            <span style={{ fontSize: 12, fontWeight: 700, color: "#FF00BF", fontFamily: "monospace", background: "#ffffff15", padding: "3px 10px", borderRadius: 6 }}>⏱ {formatTime(elapsed)}</span>
          )}
          <span style={{ fontSize: 12, fontWeight: 700, color: "#ffffffcc" }}>{totalCompleted}/{MODULES.length}</span>
          <div style={{ width: 100, height: 7, borderRadius: 4, background: "#ffffff30", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${progress}%`, borderRadius: 4, background: progress === 100 ? "linear-gradient(90deg, #10b981, #34d399)" : "linear-gradient(90deg, #003B71, #FF00BF)", transition: "width 0.6s" }} />
          </div>
        </div>
      </header>

      <div style={{ display: "flex", flex: 1, minHeight: 0 }}>
        {/* SIDEBAR */}
        {sidebarOpen && (
          <nav style={{ width: 270, minWidth: 270, background: "#fff", borderRight: "1px solid #ebebf4", padding: "18px 12px", overflowY: "auto", animation: "fadeIn 0.2s ease" }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: "0.14em", textTransform: "uppercase", color: "#b0b0c8", padding: "0 10px 12px" }}>Course Modules</div>
            {MODULES.map((m, i) => {
              const isActive = activeModuleIdx === i;
              const isDone = completedModules.has(m.id);
              return (
                <button key={m.id} onClick={() => selectModule(i)}
                  style={{ width: "100%", display: "flex", alignItems: "center", gap: 12, padding: "12px", marginBottom: 2, border: isActive ? `2px solid ${m.accent}28` : "2px solid transparent", borderRadius: 14, background: isActive ? `${m.accent}05` : "transparent", cursor: "pointer", textAlign: "left", transition: "all 0.2s" }}>
                  <div style={{ width: 36, height: 36, borderRadius: 11, display: "flex", alignItems: "center", justifyContent: "center", fontSize: isDone ? 15 : 17, background: isDone ? "#ecfdf5" : isActive ? `${m.accent}10` : "#f4f4fa", color: isDone ? "#10b981" : m.accent, border: isDone ? "2px solid #a7f3d0" : isActive ? `2px solid ${m.accent}28` : "2px solid #ebebf4", flexShrink: 0 }}>
                    {isDone ? "✓" : m.icon}
                  </div>
                  <div style={{ minWidth: 0, flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: isActive ? 700 : 600, color: isActive ? "#1a1a2e" : "#5a5a78", marginBottom: 1, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{m.title}</div>
                    <div style={{ fontSize: 11, color: isDone ? "#10b981" : "#a0a0b8", fontWeight: 600 }}>{isDone ? "Completed ✓" : m.subtitle}</div>
                  </div>
                </button>
              );
            })}
            {progress === 100 && (
              <div style={{ marginTop: 18, padding: "18px 14px", borderRadius: 14, background: "linear-gradient(135deg, #ecfdf5, #f0fdf4)", border: "2px solid #a7f3d0", textAlign: "center" }}>
                <div style={{ fontSize: 30, marginBottom: 6 }}>🎓</div>
                <div style={{ fontSize: 14, fontWeight: 800, color: "#065f46" }}>Onboarding Complete!</div>
                <div style={{ fontSize: 11, color: "#34d399", marginTop: 3, fontWeight: 600 }}>You're ready to hit the road</div>
              </div>
            )}
            <button onClick={handleRestart} style={{ width: "100%", marginTop: 18, padding: "12px", borderRadius: 12, border: "2px solid #e8e8f0", background: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 700, color: "#7D868C", fontFamily: "'Source Sans Pro', sans-serif", transition: "all 0.2s" }}>
              🔄 Restart for Next Driver
            </button>
          </nav>
        )}

        {/* MAIN CONTENT */}
        <main style={{ flex: 1, overflowY: "auto", display: "flex", justifyContent: "center", padding: "36px 28px 56px" }}>
          {!mod ? (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", maxWidth: 440, animation: "fadeIn 0.5s ease" }}>
              <div style={{ width: 84, height: 84, borderRadius: 22, background: "linear-gradient(135deg, #003B7115, #FF00BF15)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 38, marginBottom: 22, border: "2px solid #003B7130" }}>📘</div>
              <div style={{ fontSize: 24, fontWeight: 900, color: "#FF00BF", letterSpacing: "0.05em", marginBottom: 6 }}>flexdrive</div>
              <h2 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 26, fontWeight: 800, color: "#1a1a2e", marginBottom: 10 }}>Driver Onboarding</h2>
              <p style={{ fontSize: 15, color: "#8a8aa8", lineHeight: 1.7, marginBottom: 12 }}>
                {MODULES.length} learning modules to finish your onboarding. Each module includes guided lessons, real-world scenarios, and a final knowledge check.
              </p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center", margin: "8px 0 28px" }}>
                {["📖 Guided lessons", "💭 Scenarios", "🎯 Quizzes"].map((tag) => (
                  <span key={tag} style={{ fontSize: 12, fontWeight: 600, color: "#6a6a88", background: "#f0f0fa", padding: "5px 12px", borderRadius: 8 }}>{tag}</span>
                ))}
              </div>
              <button onClick={() => selectModule(0)} style={btnPrimary("#003B71", false)}>Start Module 1 →</button>
            </div>
          ) : (
            <div key={animKey} style={{ maxWidth: 560, width: "100%", animation: "slideUp 0.3s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
                <StepDots total={mod.steps.length} current={stepIdx} accent={mod.accent} />
                <span style={{ fontSize: 12, fontWeight: 700, color: "#a0a0b8" }}>{stepIdx + 1} / {mod.steps.length}</span>
              </div>
              <div style={{ background: "#fff", borderRadius: 20, padding: "32px 30px", border: "1px solid #ebebf4", boxShadow: "0 2px 20px rgba(0,0,0,0.03)", minHeight: 340 }}>
                {step.type === "intro" && <IntroCard step={step} accent={mod.accent} onNext={goNext} />}
                {step.type === "visual" && <VisualCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} />}
                {step.type === "learn" && <LearnCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} />}
                {step.type === "scenario" && <ScenarioCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} />}
                {step.type === "checkpoint" && (
                  <CheckpointCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} alreadyPassed={completedModules.has(mod.id)} onComplete={() => handleModuleComplete(mod.id)} />
                )}
              </div>
              {completedModules.has(mod.id) && stepIdx === mod.steps.length - 1 && activeModuleIdx < MODULES.length - 1 && (
                <div style={{ textAlign: "center", marginTop: 22 }}>
                  <button onClick={() => selectModule(activeModuleIdx + 1)} style={{ ...btnPrimary(MODULES[activeModuleIdx + 1].accent, false) }}>
                    Continue to: {MODULES[activeModuleIdx + 1].title} →
                  </button>
                </div>
              )}
            </div>
          )}
        </main>
      </div>

      {/* CELEBRATION OVERLAY */}
      {showCelebration && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "linear-gradient(135deg, #003B71ee, #003B71dd)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, animation: "fadeIn 0.5s ease", overflow: "hidden" }}>
          {Array.from({ length: 30 }, (_, i) => (
            <div key={i} style={{ position: "absolute", top: -20, left: `${Math.random() * 100}%`, width: Math.random() * 10 + 6, height: Math.random() * 10 + 6, borderRadius: Math.random() > 0.5 ? "50%" : "2px", background: ["#FF00BF", "#DA3AB3", "#5E0D8B", "#fff", "#7D868C", "#10b981"][i % 6], animation: `confetti ${Math.random() * 2 + 2}s linear ${Math.random() * 1.5}s infinite` }} />
          ))}
          <div style={{ background: "#fff", borderRadius: 28, padding: "48px 40px", maxWidth: 480, textAlign: "center", animation: "celebPop 0.6s ease", position: "relative", boxShadow: "0 20px 60px rgba(0,0,0,0.3)" }}>
            <div style={{ fontSize: 72, marginBottom: 12, animation: "pulse 1.5s ease infinite" }}>🎓</div>
            <h1 style={{ fontFamily: "'Source Sans Pro', sans-serif", fontSize: 32, fontWeight: 900, color: "#003B71", margin: "0 0 8px" }}>You did it!</h1>
            <p style={{ fontSize: 17, color: "#5a5a78", lineHeight: 1.6, margin: "0 0 24px" }}>
              You've completed all {MODULES.length} FlexDrive onboarding modules.<br />You're officially ready to hit the road!
            </p>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 10, background: "#003B7110", borderRadius: 14, padding: "14px 24px", marginBottom: 28, border: "2px solid #003B7120" }}>
              <span style={{ fontSize: 24 }}>⏱</span>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#7D868C", textTransform: "uppercase", letterSpacing: "0.08em" }}>Completion time</div>
                <div style={{ fontSize: 28, fontWeight: 900, color: "#003B71", fontFamily: "monospace", lineHeight: 1.2 }}>{finalTime && formatTime(finalTime)}</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button onClick={() => setShowCelebration(false)} style={{ background: "transparent", color: "#003B71", border: "2px solid #003B71", borderRadius: 12, padding: "14px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif" }}>Review Modules</button>
              <button onClick={handleRestart} style={{ background: "#003B71", color: "#fff", border: "none", borderRadius: 12, padding: "14px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "'Source Sans Pro', sans-serif" }}>🔄 Next Driver</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FlexdriveOnboarding />);
  </script>
</body>
</html>
