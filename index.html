// ─── HELPERS ───
function parseBold(text) {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((part, i) =>
    i % 2 === 1 ? <strong key={i} style={{color:"#1a1a2e",fontWeight:700}}>{part}</strong> : <span key={i}>{part}</span>
  );
}
const btnPrimary = (accent, disabled) => ({
  background:disabled?"#d4d4e0":accent,color:"#fff",border:"none",borderRadius:12,
  padding:"14px 28px",fontSize:14,fontWeight:700,cursor:disabled?"not-allowed":"pointer",
  fontFamily:"'Source Sans Pro',sans-serif",transition:"all 0.25s",opacity:disabled?0.5:1,
});
const btnOutline = (accent) => ({
  background:"transparent",color:accent,border:`2px solid ${accent}`,borderRadius:12,
  padding:"12px 24px",fontSize:14,fontWeight:700,cursor:"pointer",
  fontFamily:"'Source Sans Pro',sans-serif",transition:"all 0.25s",
});

// ─── STEP DOTS ───
function StepDots({total,current,accent}) {
  return (
    <div style={{display:"flex",gap:5,alignItems:"center"}}>
      {Array.from({length:total},(_,i)=>(
        <div key={i} style={{width:i===current?28:8,height:8,borderRadius:4,
          background:i<current?`${accent}88`:i===current?accent:"#e2e2ee",
          transition:"all 0.4s cubic-bezier(.4,0,.2,1)"}}/>
      ))}
    </div>
  );
}

// ─── CARD COMPONENTS ───
function IntroCard({step,accent,onNext,t}) {
  return (
    <div style={{textAlign:"center",padding:"12px 0"}}>
      <div style={{width:96,height:96,borderRadius:28,background:`linear-gradient(135deg,${accent}15,${accent}08)`,
        border:`2px solid ${accent}25`,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:44,margin:"0 auto 26px"}}>{step.visual}</div>
      <h2 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:24,fontWeight:800,color:"#1a1a2e",margin:"0 0 12px",lineHeight:1.3}}>{step.title}</h2>
      <p style={{fontSize:15,color:"#6a6a88",lineHeight:1.7,maxWidth:420,margin:"0 auto 30px"}}>{step.body}</p>
      <button onClick={onNext} style={btnPrimary(accent,false)}>Let's Begin →</button>
    </div>
  );
}

function LearnCard({step,accent,onNext,t}) {
  return (
    <div>
      <div style={{display:"inline-block",fontSize:10,fontWeight:800,letterSpacing:"0.14em",
        textTransform:"uppercase",color:accent,background:`${accent}10`,padding:"5px 12px",
        borderRadius:6,marginBottom:14}}>{step.label}</div>
      <h3 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:21,fontWeight:700,color:"#1a1a2e",margin:"0 0 14px",lineHeight:1.35}}>{step.title}</h3>
      <p style={{fontSize:15,color:"#4a4a68",lineHeight:1.75,margin:"0 0 20px"}}>{parseBold(step.body)}</p>
      {step.callout&&(
        <div style={{display:"flex",gap:12,alignItems:"flex-start",background:`${accent}06`,
          border:`1px solid ${accent}18`,borderRadius:12,padding:"14px 18px",marginBottom:22}}>
          <span style={{fontSize:20,flexShrink:0}}>{step.callout.icon}</span>
          <span style={{fontSize:13.5,color:"#2a2a48",lineHeight:1.6,fontWeight:600}}>{step.callout.text}</span>
        </div>
      )}
      <button onClick={onNext} style={btnOutline(accent)}>Got it — Next →</button>
    </div>
  );
}

function VisualCard({step,accent,onNext,t}) {
  return (
    <div>
      <div style={{display:"inline-block",fontSize:10,fontWeight:800,letterSpacing:"0.14em",
        textTransform:"uppercase",color:accent,background:`${accent}10`,padding:"5px 12px",
        borderRadius:6,marginBottom:14}}>{step.label}</div>
      <h3 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:21,fontWeight:700,color:"#1a1a2e",margin:"0 0 14px",lineHeight:1.35}}>{step.title}</h3>
      <p style={{fontSize:15,color:"#4a4a68",lineHeight:1.75,margin:"0 0 20px"}}>{parseBold(step.body)}</p>
      {step.image&&(
        <div style={{display:"flex",justifyContent:"center",marginBottom:20}}>
          <img src={step.image} alt={step.title} style={{maxWidth:220,borderRadius:16,
            border:`2px solid ${accent}20`,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}/>
        </div>
      )}
      {step.callout&&(
        <div style={{display:"flex",gap:12,alignItems:"flex-start",background:`${accent}06`,
          border:`1px solid ${accent}18`,borderRadius:12,padding:"14px 18px",marginBottom:22}}>
          <span style={{fontSize:20,flexShrink:0}}>{step.callout.icon}</span>
          <span style={{fontSize:13.5,color:"#2a2a48",lineHeight:1.6,fontWeight:600}}>{step.callout.text}</span>
        </div>
      )}
      <button onClick={onNext} style={btnOutline(accent)}>Got it — Next →</button>
    </div>
  );
}

function ScenarioCard({step,accent,onNext,t}) {
  const [selected,setSelected]=useState(null);
  const [showFeedback,setShowFeedback]=useState(false);
  const [wrongPicks,setWrongPicks]=useState(new Set());
  const answered=showFeedback&&selected!==null;
  const isCorrect=answered&&step.options[selected].correct;
  const handlePick=(i)=>{
    if(showFeedback)return;
    setSelected(i);setShowFeedback(true);
    if(!step.options[i].correct)setWrongPicks(prev=>new Set([...prev,i]));
  };
  return (
    <div>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:10,fontWeight:800,
        letterSpacing:"0.14em",textTransform:"uppercase",color:"#003B71",background:"#003B7108",
        padding:"5px 12px",borderRadius:6,marginBottom:14}}>💭 {t("scenario")}</div>
      <h3 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:20,fontWeight:700,color:"#1a1a2e",margin:"0 0 10px",lineHeight:1.3}}>{step.title}</h3>
      <p style={{fontSize:15,color:"#4a4a68",lineHeight:1.7,margin:"0 0 20px"}}>{step.body}</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {step.options.map((opt,i)=>{
          let bg="#f8f8fc",border="2px solid #e8e8f0",color="#2a2a48";
          const isDisabled=wrongPicks.has(i)||(answered&&isCorrect);
          if(answered&&opt.correct){bg="#ecfdf5";border="2px solid #6ee7b7";color="#065f46";}
          else if(answered&&i===selected&&!isCorrect){bg="#fef2f2";border="2px solid #fca5a5";color="#991b1b";}
          else if(wrongPicks.has(i)){bg="#fef2f2";border="2px solid #fecaca";color="#991b1b80";}
          return(
            <button key={i} onClick={()=>handlePick(i)} disabled={isDisabled}
              style={{background:bg,border,borderRadius:12,padding:"14px 18px",textAlign:"left",
                fontSize:14,color,cursor:isDisabled?"default":"pointer",
                fontFamily:"'Source Sans Pro',sans-serif",lineHeight:1.5,transition:"all 0.25s",
                fontWeight:500,opacity:wrongPicks.has(i)&&!answered?0.55:1}}>{opt.text}</button>
          );
        })}
      </div>
      {answered&&(
        <div style={{marginTop:16,padding:"14px 18px",borderRadius:12,
          background:isCorrect?"#ecfdf5":"#fef2f2",
          border:isCorrect?"1px solid #a7f3d0":"1px solid #fecaca",
          fontSize:14,lineHeight:1.6,color:isCorrect?"#065f46":"#991b1b"}}>
          <strong>{isCorrect?t("correct"):t("notQuite")}</strong>{" "}
          {isCorrect?step.explanation:t("wrongTryAgain")}
        </div>
      )}
      {answered&&isCorrect&&<button onClick={onNext} style={{...btnPrimary(accent,false),marginTop:16}}>{t("continue")}</button>}
      {answered&&!isCorrect&&<button onClick={()=>{setSelected(null);setShowFeedback(false);}} style={{...btnOutline(accent),marginTop:16}}>{t("tryAgain")}</button>}
    </div>
  );
}

function CheckpointCard({step,accent,onComplete,alreadyPassed,t}) {
  const [selected,setSelected]=useState(null);
  const [submitted,setSubmitted]=useState(alreadyPassed);
  const [wrongPicks,setWrongPicks]=useState(new Set());
  const isCorrect=selected!==null&&step.options[selected].correct;
  const handleSubmit=()=>{
    setSubmitted(true);
    if(step.options[selected].correct)onComplete();
    else setWrongPicks(prev=>new Set([...prev,selected]));
  };
  return (
    <div>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:10,fontWeight:800,
        letterSpacing:"0.14em",textTransform:"uppercase",color:accent,background:`${accent}10`,
        padding:"5px 12px",borderRadius:6,marginBottom:14}}>🎯 {t("finalCheck")}</div>
      <h3 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:20,fontWeight:700,color:"#1a1a2e",margin:"0 0 10px",lineHeight:1.3}}>{step.title}</h3>
      <p style={{fontSize:15,color:"#4a4a68",lineHeight:1.7,margin:"0 0 20px",fontWeight:500}}>{step.question}</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {step.options.map((opt,i)=>{
          let bg="#f8f8fc",border="2px solid #e8e8f0",color="#2a2a48";
          const isDisabled=wrongPicks.has(i)||(submitted&&isCorrect);
          if(submitted&&opt.correct&&isCorrect){bg="#ecfdf5";border="2px solid #6ee7b7";color="#065f46";}
          else if(submitted&&i===selected&&!isCorrect){bg="#fef2f2";border="2px solid #fca5a5";color="#991b1b";}
          else if(wrongPicks.has(i)){bg="#fef2f2";border="2px solid #fecaca";color="#991b1b80";}
          else if(!submitted&&i===selected){bg=`${accent}08`;border=`2px solid ${accent}`;}
          return(
            <button key={i} onClick={()=>!submitted&&!wrongPicks.has(i)&&setSelected(i)} disabled={isDisabled}
              style={{background:bg,border,borderRadius:12,padding:"14px 18px",textAlign:"left",
                fontSize:14,color,cursor:isDisabled?"default":"pointer",
                fontFamily:"'Source Sans Pro',sans-serif",lineHeight:1.5,transition:"all 0.25s",
                fontWeight:500,opacity:wrongPicks.has(i)?0.55:1}}>{opt.text}</button>
          );
        })}
      </div>
      {!submitted&&<button onClick={handleSubmit} disabled={selected===null} style={{...btnPrimary(accent,selected===null),marginTop:16}}>{t("submitAnswer")}</button>}
      {submitted&&(
        <>
          <div style={{marginTop:16,padding:"14px 18px",borderRadius:12,
            background:isCorrect?"#ecfdf5":"#fef2f2",
            border:isCorrect?"1px solid #a7f3d0":"1px solid #fecaca",
            fontSize:14,lineHeight:1.6,color:isCorrect?"#065f46":"#991b1b"}}>
            <strong>{isCorrect?t("correct"):t("notQuite")}</strong>{" "}
            {isCorrect?step.explanation:t("wrongTryAgain")}
          </div>
          {isCorrect&&(
            <div style={{marginTop:22,textAlign:"center",padding:24,borderRadius:16,
              background:"linear-gradient(135deg,#f0fdf4,#ecfdf5)",border:"2px solid #a7f3d0"}}>
              <div style={{fontSize:36,marginBottom:6}}>🎉</div>
              <div style={{fontSize:18,fontWeight:800,color:"#065f46",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("moduleComplete")}</div>
              <div style={{fontSize:13,color:"#34d399",marginTop:4,fontWeight:600}}>{t("topicLockedIn")}</div>
            </div>
          )}
          {!isCorrect&&<button onClick={()=>{setSelected(null);setSubmitted(false);}} style={{...btnOutline(accent),marginTop:16}}>{t("tryAgain")}</button>}
        </>
      )}
    </div>
  );
}

    {type:"learn",label:"CDW Protection",title:"Consider the Collision Damage Waiver",body:"All drivers are **encouraged** (but not required) to add the **Collision Damage Waiver (CDW)** to reduce or avoid damage fees. If you want to change your CDW selection later, you'll need an onsite inspection and in-person renewal at your rental location.",callout:{icon:"🛡️",text:"CDW = peace of mind against damage charges"}},
    {type:"learn",label:"With vs Without CDW",title:"See the difference CDW makes",body:"**With CDW:** Reduced or no out-of-pocket costs, fast streamlined claims, coverage designed for rideshare use, small predictable weekly cost, no surprise deductibles. **Without CDW:** You pay the full cost of all damage, complex claims you manage alone, personal auto insurance may deny your claim, unpredictable repair bills that could reach thousands.",callout:{icon:"⚖️",text:"A minor fender-bender without CDW could cost you thousands. With CDW, it's handled quickly with little to no cost."}},
    {type:"learn",label:"How to Add CDW",title:"Adding CDW is quick and easy",body:"To add CDW: **1.** Ask your onboarding representative about adding CDW. **2.** Review the CDW agreement and ask any questions you may have. **3.** Sign the CDW addendum — coverage takes effect immediately. Remember: your weekly rental fee does NOT cover tire blowouts, collision damage, or windshield damage. CDW helps protect you from these costs.",callout:{icon:"✍️",text:"Ask your onboarding representative to add CDW today — coverage starts immediately."}},
    {type:"learn",label:"Critical Rule",title:"Never repair damage yourself",body:"This is important: **do NOT attempt to repair any damage on your own.** Always report damage through the proper channels and let your rental location handle repairs. Self-repairs can void protections and create additional charges.",callout:{icon:"🚫",text:"NEVER attempt self-repairs on any damage"}},
    {type:"checkpoint",title:"Knowledge Check",question:"What is the threshold for chargeable damage?",options:[{text:"Any scratch or dent, no matter how small",correct:false},{text:"Greater than 12 inches",correct:false},{text:"Greater than 6 inches OR greater than the size of a quarter",correct:true},{text:"Only damage visible from 10 feet away",correct:false}],explanation:"Chargeable damage includes any damage greater than 6 inches OR greater than the size of a quarter."},
  ]},
  {id:"return",icon:"🔑",title:"Return Expectations",subtitle:"Returning your vehicle the right way",accent:"#003B71",steps:[
    {type:"intro",title:"Let's learn about Return Expectations",body:"When it's time to return your vehicle, following the correct steps will save you from unexpected charges. This module covers everything from cleaning to timing.",visual:"🔑"},
    {type:"learn",label:"Scheduling",title:"Appointments are encouraged but not required",body:"You can schedule a return appointment through the **Lyft Driver App**. While not mandatory, scheduling ahead helps ensure a smooth return process.",callout:null},
    {type:"learn",label:"Vehicle Condition",title:"Return the vehicle clean and fueled",body:"Before returning, your vehicle must be: **vacuumed and wiped down** inside, **washed** outside, and **fueled** to the same level as when you picked it up. Charges will apply if cleaning or fueling isn't completed.",callout:{icon:"✨",text:"Clean inside + Clean outside + Full fuel = No extra charges"}},
    {type:"scenario",title:"Quick Scenario",body:"You return your vehicle at 7 PM on Saturday. When will your rental contract be closed?",options:[{text:"Immediately upon drop-off",correct:false},{text:"The next business day — and you'll be charged through then",correct:true},{text:"The following Saturday",correct:false}],explanation:"After-hours or weekend returns mean your contract won't close until the next business day, and you'll be charged through that day."},
    {type:"learn",label:"Personal Belongings",title:"Don't leave anything behind",body:"Lyft/Flexdrive is **NOT responsible** for any belongings left in the vehicle after return or repossession. All items left behind will be **disposed of**. Double-check the vehicle thoroughly before handing over the keys.",callout:{icon:"⚠️",text:"All belongings left behind WILL be disposed of — no exceptions"}},
    {type:"checkpoint",title:"Knowledge Check",question:"Which of the following is required before returning your vehicle?",options:[{text:"Only vacuum the interior",correct:false},{text:"Just fill the gas tank",correct:false},{text:"Vacuum & wipe inside, wash outside, and fuel to pickup level",correct:true},{text:"Nothing — the rental location handles cleaning",correct:false}],explanation:"You must vacuum and wipe down the interior, wash the exterior, and fuel the vehicle to the same level as pickup. Charges apply for any of these not completed."},
  ]},
  {id:"navigate",icon:"📱",title:"Navigating the Lyft Driver App",subtitle:"Find your rental details step by step",accent:"#7D868C",steps:[
    {type:"intro",title:"Let's learn to navigate the Lyft Driver App",body:"Knowing where to find your rental details, ride minimums, personal miles, and billing history is essential. This module walks you through each screen step by step.",visual:"📱"},
    {type:"visual",label:"Step 1",title:"Start from the Driver Home Screen",body:"When you open the Lyft Driver app, this is your home screen. You can see your **earnings at the top**, the map, a **Personal miles** widget (e.g. 0/25), and your **Platinum status** progress. Notice the **hamburger menu (☰)** in the top-left — tap that to access your rental details.",image:IMG1,callout:{icon:"👆",text:"Tap the ☰ menu icon in the top-left corner to proceed."}},
    {type:"visual",label:"Step 2",title:"Open Vehicle and Devices",body:"In the side menu, scroll down and find the **Vehicle and Devices** section. Tap to expand. You'll see **Your Vehicles**, **Schedule Vehicle Service**, **Glow**, **Your recording devices**, and **Order emblem and airport docs**. Tap **Your Vehicles** to continue.",image:IMG2,callout:{icon:"👆",text:'Tap "Your Vehicles" under Vehicle and Devices.'}},
    {type:"visual",label:"Step 3",title:"View Your Express Drive Vehicle",body:"The Vehicles screen shows your current rental with the **lyf express drive** label, vehicle details (e.g. **2025 Toyota Corolla Hybrid**), the plate number, and an **In use** badge. Tap **See details** to view full rental information.",image:IMG3,callout:{icon:"👆",text:'Tap "See details" to open the full rental dashboard.'}},
    {type:"visual",label:"Step 4",title:"Rental Dashboard — Rides & Miles",body:"This is your rental details page. You'll see: **Ride minimum** (e.g. 20 rides/week, 5/20 completed, 15 left — resets Monday 05:00 AM) and **Personal miles** (e.g. Pay as you go, 0/25 used — also resets Monday 05:00 AM). Scroll down for more options.",image:IMG4,callout:{icon:"📊",text:"Track your ride minimum and personal miles here — both reset Monday at 5:00 AM."}},
    {type:"visual",label:"Step 5",title:"Manage Rental & View History",body:"Scroll further to see **Recent usage** — a chart of your personal miles over time. Below that is **Manage rental** with quick links: **Learn about Express Drive**, **View weekly cost**, **See Express Drive billing history**, **Schedule preventative maintenance**, **Change mileage plan**, and **Change protection plan**.",image:IMG5,callout:{icon:"🔧",text:"Use Manage rental to view billing, schedule maintenance, or change your mileage/protection plan."}},
    {type:"checkpoint",title:"Knowledge Check",question:"To view your ride minimum and personal miles, where do you navigate?",options:[{text:"Settings > Account > Rides",correct:false},{text:"☰ Menu > Vehicle and Devices > Your Vehicles > See details",correct:true},{text:"The earnings tab at the top of the home screen",correct:false},{text:"Support and Resources > Rental Info",correct:false}],explanation:"Navigate to ☰ Menu > Vehicle and Devices > Your Vehicles > See details to see your ride minimum, personal miles, recent usage, and manage rental options."},
  ]},

// ─── GET MODULES BY LANGUAGE ───
function getModules(lang) {
  if(lang==="en"||!lang) return MODULES;
  // For other languages, return same structure but keep navigate module using same images
  const nav = MODULES[MODULES.length-1];
  return MODULES.map(m => {
    if(m.id==="navigate") return nav; // always use EN navigate (has real screenshots)
    return m;
  });
}

// ─── EV MODULE ───
const EV_MODULE = {
  id:"ev",icon:"⚡",title:"Electric Vehicle Basics",subtitle:"Everything you need to know about your EV",accent:"#0ea5e9",
  steps:[
    {type:"intro",title:"Welcome to EV Training!",body:"You're renting an electric vehicle — great choice! EVs offer lower running costs, a smoother driving experience, and reduced environmental impact. This bonus module covers everything you need to drive and charge confidently.",visual:"⚡"},
    {type:"learn",label:"EV vs Gas",title:"How an EV differs from a gas car",body:"**Electric Vehicle (EV):** Battery powered, lower range (~240 miles), more savings on fuel. **Gas Car (ICE):** Gas powered, higher range (350+ miles), more money spent on fuel. EVs are quiet — they won't make noise when starting, but the car IS on! Acceleration is faster in an EV, but aggressive driving reduces range.",callout:{icon:"🔇",text:"EVs are silent when starting — check the dashboard to confirm the car is on."}},
    {type:"learn",label:"Regenerative Braking",title:"Let the car recharge itself",body:"When you lift your foot off the accelerator, an EV **automatically slows down and recharges the battery** — this is called regenerative braking. It saves range and reduces brake wear. The more you use it, the further you'll go on a single charge.",callout:{icon:"🔋",text:"Regenerative braking = free range! Lift off the accelerator early to maximize it."}},
    {type:"learn",label:"Battery Range",title:"Managing your range",body:"On a full charge (100%), expect approximately **240–270 miles** of range. **Head to a charging station when you're at 10–20% remaining.** Climate control and driving style affect range — smooth acceleration and limiting A/C or heat will extend it.",callout:{icon:"⚠️",text:"Charge when you hit 10–20% remaining. Do not let the battery drop below 10%!"}},
    {type:"learn",label:"Charging Levels",title:"Level 1, Level 2, and Level 3 charging",body:"**Level 1 (~48 hrs to full):** Standard 120V household outlet. ~2–5 miles of range per hour. Backup only. **Level 2 (~6–8 hrs to full):** 240V outlet, the everyday workhorse. ~10–60 miles per hour. Best for daily home/workplace charging. **Level 3 / DCFC (~45 min to 80%):** DC fast charging. Best for quick top-ups. Charging slows after 80% to protect the battery.",callout:{icon:"⚡",text:"Level 3 gets you to 80% in ~45 min — but daily use can degrade the battery over time."}},
    {type:"learn",label:"Connector Types",title:"Know your charging plugs",body:"Your EV uses specific connector types: **J-1772** is used for Level 1 and Level 2 charging — this is the standard plug. **CCS/SAE** is used for Level 3 (DC fast charging) — a larger combo plug. Some newer vehicles use **NACS** (Tesla-style) connectors. Check your vehicle's charging port before connecting.",callout:{icon:"🔌",text:"L1 & L2 = J-1772 plug. L3 = CCS/SAE combo plug. Always verify before connecting."}},
    {type:"learn",label:"Battery Health",title:"Keep your battery healthy long-term",body:"**Keep daily charge between 20–80%** — optimal for battery longevity. **Limit frequent DC fast charging (L3)** — accelerates degradation. **Avoid extreme temperatures** — park in shade during heat, keep plugged in during extreme cold. **Keep software updated.** Always ensure the vehicle has over 10% charge to prevent 12V battery issues.",callout:{icon:"💚",text:"Daily rule: charge between 20–80%. Save 100% charges for long trips only."}},
    {type:"learn",label:"EV Maintenance",title:"Maintenance is simpler with an EV",body:"EVs require **less maintenance** — no oil changes, spark plugs, or transmission fluid. Your EV gets an **EV Dry PM Service Check** every 10,000 miles: coolant, brake fluid, wiper fluid, and A/C refrigerant checks. **Tire rotations and brake inspections** are still needed. If your EV repeatedly fails to start charging, it may need a **software update from the dealership**.",callout:{icon:"🔧",text:"No oil changes! Just fluid checks, tire rotations, and software updates."}},
    {type:"scenario",title:"EV Scenario",body:"You're driving your EV and notice the battery is at 15% with 35 miles of range left. What should you do?",options:[{text:"Keep driving and finish your current ride queue",correct:false},{text:"Head to a charging station — you're in the 10–20% zone",correct:true},{text:"Turn off the A/C and keep driving until 5%",correct:false}],explanation:"Head to a charging station when at 10–20% remaining. Do not let the battery drop below 10%."},
    {type:"checkpoint",title:"EV Knowledge Check",question:"What is the optimal daily charge range for battery health?",options:[{text:"0–100% every time",correct:false},{text:"20–80%",correct:true},{text:"50–100%",correct:false},{text:"Drain to 0% then fully charge",correct:false}],explanation:"Keep daily charging between 20–80% for optimal battery longevity. Save 100% charges for long trips only."},
  ],
};

// ─── MAIN APP ───
function FlexdriveOnboarding() {
  const [lang,setLang]=useState(null);
  const [activeModuleIdx,setActiveModuleIdx]=useState(null);
  const [stepIdx,setStepIdx]=useState(0);
  const [completedModules,setCompletedModules]=useState(new Set());
  const [animKey,setAnimKey]=useState(0);
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [startTime,setStartTime]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [showCelebration,setShowCelebration]=useState(false);
  const [finalTime,setFinalTime]=useState(null);
  const [evMode,setEvMode]=useState(null);
  const [evStepIdx,setEvStepIdx]=useState(0);
  const [evAnimKey,setEvAnimKey]=useState(0);
  const [evCompleted,setEvCompleted]=useState(false);

  const MODS = MODULES; // always English for now (navigate module has real images)
  const t = (key) => (UI[lang]||UI.en)[key]||UI.en[key]||key;
  const mod = activeModuleIdx!==null ? MODS[activeModuleIdx] : null;
  const step = mod ? mod.steps[stepIdx] : null;
  const evStep = EV_MODULE.steps[evStepIdx];
  const totalCompleted = completedModules.size;
  const progress = Math.round((totalCompleted/MODS.length)*100);

  useEffect(()=>{
    const iv=setInterval(()=>{
      if(startTime&&!showCelebration) setElapsed(Math.floor((Date.now()-startTime)/1000));
    },1000);
    return()=>clearInterval(iv);
  },[startTime,showCelebration]);

  const formatTime=(s)=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

  const goNext=useCallback(()=>{
    if(!mod)return;
    if(stepIdx<mod.steps.length-1){setStepIdx(s=>s+1);setAnimKey(k=>k+1);}
  },[mod,stepIdx]);

  const goNextEV=useCallback(()=>{
    if(evStepIdx<EV_MODULE.steps.length-1){setEvStepIdx(s=>s+1);setEvAnimKey(k=>k+1);}
  },[evStepIdx]);

  const selectModule=(idx)=>{
    if(!startTime)setStartTime(Date.now());
    setActiveModuleIdx(idx);setStepIdx(0);setAnimKey(k=>k+1);
  };

  const handleModuleComplete=(modId)=>{
    const next=new Set([...completedModules,modId]);
    setCompletedModules(next);
    if(next.size===MODS.length){
      setFinalTime(Math.floor((Date.now()-startTime)/1000));
      setShowCelebration(true);
    }
  };

  const handleRestart=()=>{
    setActiveModuleIdx(null);setStepIdx(0);setCompletedModules(new Set());
    setAnimKey(0);setStartTime(null);setElapsed(0);setShowCelebration(false);
    setFinalTime(null);setLang(null);setEvMode(null);setEvStepIdx(0);
    setEvAnimKey(0);setEvCompleted(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"#F6F6FB",fontFamily:"'Source Sans Pro',sans-serif",display:"flex",flexDirection:"column"}}>
      {/* HEADER */}
      <header style={{background:"#003B71",padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <button onClick={()=>setSidebarOpen(!sidebarOpen)} style={{background:"none",border:"1px solid #ffffff30",borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:16,color:"#ffffffcc"}}>☰</button>
          <div>
            <img src={LOGO_WHITE} alt="flexdrive" style={{height:44,display:"block"}} />
            <h1 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:20,fontWeight:800,color:"#ffffff",margin:0}}>{t("driverOnboarding")}</h1>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          {startTime&&!showCelebration&&<span style={{fontSize:12,fontWeight:700,color:"#FF00BF",fontFamily:"monospace",background:"#ffffff15",padding:"3px 10px",borderRadius:6}}>⏱ {formatTime(elapsed)}</span>}
          <span style={{fontSize:12,fontWeight:700,color:"#ffffffcc"}}>{totalCompleted}/{MODS.length}</span>
          <div style={{width:100,height:7,borderRadius:4,background:"#ffffff30",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${progress}%`,borderRadius:4,background:progress===100?"linear-gradient(90deg,#10b981,#34d399)":"linear-gradient(90deg,#003B71,#FF00BF)",transition:"width 0.6s"}}/>
          </div>
        </div>
      </header>

      <div style={{display:"flex",flex:1,minHeight:0}}>
        {/* SIDEBAR */}
        {sidebarOpen&&(
          <nav style={{width:270,minWidth:270,background:"#fff",borderRight:"1px solid #ebebf4",padding:"18px 12px",overflowY:"auto",animation:"fadeIn 0.2s ease"}}>
            <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.14em",textTransform:"uppercase",color:"#b0b0c8",padding:"0 10px 12px"}}>{t("courseModules")}</div>
            {MODS.map((m,i)=>{
              const isActive=activeModuleIdx===i,isDone=completedModules.has(m.id);
              return(
                <button key={m.id} onClick={()=>selectModule(i)}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:12,padding:12,marginBottom:2,
                    border:isActive?`2px solid ${m.accent}28`:"2px solid transparent",borderRadius:14,
                    background:isActive?`${m.accent}05`:"transparent",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}>
                  <div style={{width:36,height:36,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:isDone?15:17,background:isDone?"#ecfdf5":isActive?`${m.accent}10`:"#f4f4fa",
                    color:isDone?"#10b981":m.accent,border:isDone?"2px solid #a7f3d0":isActive?`2px solid ${m.accent}28`:"2px solid #ebebf4",flexShrink:0}}>
                    {isDone?"✓":m.icon}
                  </div>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:13,fontWeight:isActive?700:600,color:isActive?"#1a1a2e":"#5a5a78",marginBottom:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.title}</div>
                    <div style={{fontSize:11,color:isDone?"#10b981":"#a0a0b8",fontWeight:600}}>{isDone?t("completed"):m.subtitle}</div>
                  </div>
                </button>
              );
            })}
            {progress===100&&(
              <div style={{marginTop:18,padding:"18px 14px",borderRadius:14,background:"linear-gradient(135deg,#ecfdf5,#f0fdf4)",border:"2px solid #a7f3d0",textAlign:"center"}}>
                <div style={{fontSize:30,marginBottom:6}}>🎓</div>
                <div style={{fontSize:14,fontWeight:800,color:"#065f46"}}>{t("onboardingComplete")}</div>
                <div style={{fontSize:11,color:"#34d399",marginTop:3,fontWeight:600}}>{t("readyToRoad")}</div>
              </div>
            )}
            <button onClick={handleRestart} style={{width:"100%",marginTop:18,padding:12,borderRadius:12,border:"2px solid #e8e8f0",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:700,color:"#7D868C",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("restartBtn")}</button>
          </nav>
        )}

        {/* MAIN CONTENT */}
        <main style={{flex:1,overflowY:"auto",display:"flex",justifyContent:"center",padding:"36px 28px 56px"}}>
          {!mod?(
            !lang?(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",maxWidth:440,animation:"fadeIn 0.5s ease"}}>
                <div style={{width:84,height:84,borderRadius:22,background:"linear-gradient(135deg,#003B7115,#FF00BF15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,marginBottom:22,border:"2px solid #003B7130"}}>📘</div>
                <img src={LOGO_COLOR} alt="flexdrive" style={{height:52,marginBottom:4,display:"block"}} />
                <h2 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:26,fontWeight:800,color:"#1a1a2e",marginBottom:10}}>Driver Onboarding</h2>
                <p style={{fontSize:16,fontWeight:700,color:"#003B71",marginBottom:8}}>{t("chooseLanguage")}</p>
                <p style={{fontSize:13,color:"#a0a0b8",marginBottom:28}}>{t("selectLanguage")}</p>
                <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center"}}>
                  {[["en","English"],["es","Español"],["ru","Русский"],["ar","العربية"]].map(([code,label])=>(
                    <button key={code} onClick={()=>setLang(code)}
                      style={{background:"#003B71",color:"#fff",border:"none",borderRadius:14,padding:"18px 36px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif",minWidth:160,transition:"all 0.25s"}}>{label}</button>
                  ))}
                </div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",maxWidth:440,animation:"fadeIn 0.5s ease"}}>
                <div style={{width:84,height:84,borderRadius:22,background:"linear-gradient(135deg,#003B7115,#FF00BF15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:38,marginBottom:22,border:"2px solid #003B7130"}}>📘</div>
                <img src={LOGO_COLOR} alt="flexdrive" style={{height:52,marginBottom:4,display:"block"}} />
                <h2 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:26,fontWeight:800,color:"#1a1a2e",marginBottom:10}}>{t("driverOnboarding")}</h2>
                <p style={{fontSize:15,color:"#8a8aa8",lineHeight:1.7,marginBottom:12}}>{MODS.length} {t("welcomeSub")}</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",margin:"8px 0 28px"}}>
                  {[t("guidedLessons"),t("scenarios"),t("quizzes")].map(tag=>(
                    <span key={tag} style={{fontSize:12,fontWeight:600,color:"#6a6a88",background:"#f0f0fa",padding:"5px 12px",borderRadius:8}}>{tag}</span>
                  ))}
                </div>
                <button onClick={()=>selectModule(0)} style={{background:"#003B71",color:"#fff",border:"none",borderRadius:12,padding:"14px 28px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("startModule")}</button>
              </div>
            )
          ):(
            <div key={animKey} style={{maxWidth:560,width:"100%",animation:"slideUp 0.3s ease"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
                <StepDots total={mod.steps.length} current={stepIdx} accent={mod.accent}/>
                <span style={{fontSize:12,fontWeight:700,color:"#a0a0b8"}}>{stepIdx+1} / {mod.steps.length}</span>
              </div>
              <div style={{background:"#fff",borderRadius:20,padding:"32px 30px",border:"1px solid #ebebf4",boxShadow:"0 2px 20px rgba(0,0,0,0.03)",minHeight:340}}>
                {step.type==="intro"&&<IntroCard step={step} accent={mod.accent} onNext={goNext} t={t}/>}
                {step.type==="visual"&&<VisualCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t}/>}
                {step.type==="learn"&&<LearnCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t}/>}
                {step.type==="scenario"&&<ScenarioCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} onNext={goNext} t={t}/>}
                {step.type==="checkpoint"&&<CheckpointCard key={`${mod.id}-${stepIdx}`} step={step} accent={mod.accent} alreadyPassed={completedModules.has(mod.id)} t={t} onComplete={()=>handleModuleComplete(mod.id)}/>}
              </div>
              {completedModules.has(mod.id)&&stepIdx===mod.steps.length-1&&activeModuleIdx<MODS.length-1&&(
                <div style={{textAlign:"center",marginTop:22}}>
                  <button onClick={()=>selectModule(activeModuleIdx+1)} style={{background:MODS[activeModuleIdx+1].accent,color:"#fff",border:"none",borderRadius:12,padding:"14px 28px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>
                    {t("continueTo")} {MODS[activeModuleIdx+1].title} →
                  </button>
                </div>
              )}
            </div>
          )}
        </main>
      </div>

      {/* EV TRAINING OVERLAY */}
      {evMode==="yes"&&showCelebration&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#F6F6FB",display:"flex",flexDirection:"column",zIndex:101,animation:"fadeIn 0.3s ease"}}>
          <div style={{background:"#0ea5e9",padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.14em",textTransform:"uppercase",color:"#fff",marginBottom:2}}>⚡ {EV_MODULE.title}</div>
              <div style={{fontSize:14,fontWeight:600,color:"#ffffffcc"}}>{EV_MODULE.subtitle}</div>
            </div>
            <div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{evStepIdx+1} / {EV_MODULE.steps.length}</div>
          </div>
          <div style={{flex:1,overflowY:"auto",display:"flex",justifyContent:"center",padding:"32px 24px 48px"}}>
            <div key={evAnimKey} style={{maxWidth:560,width:"100%",animation:"slideUp 0.3s ease"}}>
              <StepDots total={EV_MODULE.steps.length} current={evStepIdx} accent="#0ea5e9"/>
              <div style={{background:"#fff",borderRadius:20,padding:"32px 30px",border:"1px solid #ebebf4",boxShadow:"0 2px 20px rgba(0,0,0,0.03)",minHeight:340,marginTop:20}}>
                {evStep.type==="intro"&&<IntroCard step={evStep} accent="#0ea5e9" onNext={goNextEV} t={t}/>}
                {evStep.type==="learn"&&<LearnCard key={`ev-${evStepIdx}`} step={evStep} accent="#0ea5e9" onNext={goNextEV} t={t}/>}
                {evStep.type==="scenario"&&<ScenarioCard key={`ev-${evStepIdx}`} step={evStep} accent="#0ea5e9" onNext={goNextEV} t={t}/>}
                {evStep.type==="checkpoint"&&(
                  <CheckpointCard key={`ev-${evStepIdx}`} step={evStep} accent="#0ea5e9" alreadyPassed={evCompleted} t={t}
                    onComplete={()=>{setEvCompleted(true);setTimeout(()=>{setEvMode("done");},2000);}}/>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* CELEBRATION OVERLAY */}
      {showCelebration&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"linear-gradient(135deg,#003B71ee,#003B71dd)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,animation:"fadeIn 0.5s ease",overflow:"hidden"}}>
          {Array.from({length:30},(_,i)=>(
            <div key={i} style={{position:"absolute",top:-20,left:`${(i*3.4)%100}%`,width:i%3===0?12:8,height:i%3===0?12:8,borderRadius:i%2===0?"50%":"2px",background:["#FF00BF","#DA3AB3","#5E0D8B","#fff","#7D868C","#10b981"][i%6],animation:`confetti ${2+i%3}s linear ${i*0.12}s infinite`}}/>
          ))}
          <div style={{background:"#fff",borderRadius:28,padding:"48px 40px",maxWidth:480,textAlign:"center",animation:"celebPop 0.6s ease",position:"relative",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{fontSize:72,marginBottom:12,animation:"pulse 1.5s ease infinite"}}>🎓</div>
            <h1 style={{fontFamily:"'Source Sans Pro',sans-serif",fontSize:32,fontWeight:900,color:"#003B71",margin:"0 0 8px"}}>{t("youDidIt")}</h1>
            <p style={{fontSize:17,color:"#5a5a78",lineHeight:1.6,margin:"0 0 8px"}}>{t("celebSub1")} {MODS.length}</p>
            <img src={LOGO_COLOR} alt="flexdrive" style={{height:48,marginBottom:8,display:"block"}} />
            <p style={{fontSize:17,color:"#5a5a78",lineHeight:1.6,margin:"0 0 24px"}}>{t("celebSub2")}<br/>{t("celebSub3")}</p>
            {finalTime&&(
              <div style={{display:"inline-flex",alignItems:"center",gap:10,background:"#003B7110",borderRadius:14,padding:"14px 24px",marginBottom:28,border:"2px solid #003B7120"}}>
                <span style={{fontSize:24}}>⏱</span>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#7D868C",textTransform:"uppercase",letterSpacing:"0.08em"}}>{t("completionTime")}</div>
                  <div style={{fontSize:28,fontWeight:900,color:"#003B71",fontFamily:"monospace",lineHeight:1.2}}>{formatTime(finalTime)}</div>
                </div>
              </div>
            )}
            {evMode===null&&(
              <>
                <p style={{fontSize:15,fontWeight:700,color:"#003B71",margin:"0 0 14px"}}>{t("evQuestion")}</p>
                <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setEvMode("yes")} style={{background:"#0ea5e9",color:"#fff",border:"none",borderRadius:12,padding:"14px 24px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("yesEV")}</button>
                  <button onClick={()=>setEvMode("no")} style={{background:"transparent",color:"#003B71",border:"2px solid #003B71",borderRadius:12,padding:"14px 24px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("noEV")}</button>
                </div>
              </>
            )}
            {(evMode==="no"||evMode==="done")&&(
              <>
                {evMode==="done"&&(
                  <div style={{marginBottom:16,padding:"12px 20px",borderRadius:12,background:"#0ea5e910",border:"1px solid #0ea5e930"}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#0ea5e9"}}>{t("evComplete")}</div>
                    <div style={{fontSize:12,color:"#5a5a78",marginTop:2}}>{t("evReadyToRoad")}</div>
                  </div>
                )}
                <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
                  <button onClick={()=>setShowCelebration(false)} style={{background:"transparent",color:"#003B71",border:"2px solid #003B71",borderRadius:12,padding:"14px 24px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("reviewModules")}</button>
                  <button onClick={handleRestart} style={{background:"#003B71",color:"#fff",border:"none",borderRadius:12,padding:"14px 24px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Source Sans Pro',sans-serif"}}>{t("nextDriver")}</button>
                </div>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FlexdriveOnboarding />);
  </script>
</body>
</html>
